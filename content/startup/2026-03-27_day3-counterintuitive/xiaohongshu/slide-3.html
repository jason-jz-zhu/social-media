<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 56px;
  }

  .analogy-section {
    margin-bottom: 48px;
  }

  .analogy-label {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 500;
    padding: 4px 16px;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .analogy-content {
    font-size: 36px;
    color: #333;
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .analogy-sub {
    font-size: 30px;
    color: #888;
    line-height: 1.5;
  }

  .exception-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 28px 32px;
    margin-top: 24px;
    margin-bottom: 40px;
  }

  .exception-box .label {
    font-size: 28px;
    font-weight: 700;
    color: #7C3AED;
    margin-bottom: 12px;
  }

  .exception-box p {
    font-size: 34px;
    color: #333;
    line-height: 1.7;
  }

  .bottom-hook {
    margin-top: auto;
    margin-bottom: 40px;
    font-size: 36px;
    font-weight: 700;
    color: #7C3AED;
    line-height: 1.6;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 3</span></div>

    <h1 class="title">创业像滑雪，直觉全是反的</h1>

    <div class="analogy-section">
      <div><span class="analogy-label">滑雪的本能</span></div>
      <p class="analogy-content">害怕→身体后仰→重心错→摔更惨</p>
      <p class="analogy-sub">正确做法是反直觉地往前倾</p>
    </div>

    <div class="analogy-section">
      <div><span class="analogy-label">创业的本能</span></div>
      <p class="analogy-content">想增长→搞套路→用户不买账→更惨</p>
      <p class="analogy-sub">正确做法是反直觉地专注做产品</p>
    </div>

    <div class="analogy-section">
      <div><span class="analogy-label">关于人的判断</span></div>
      <p class="analogy-content">外表张扬的人≠真正能扛事的人</p>
      <p class="analogy-sub">PG说：你无法预测谁会成功，安静的人跟高调的人概率一样</p>
    </div>

    <div class="exception-box">
      <p class="label">唯一例外：看人的直觉要相信</p>
      <p>创业什么都反直觉，但如果你觉得一个人不靠谱，那大概率真不靠谱。关于人的判断，相信自己的gut feeling。</p>
    </div>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
