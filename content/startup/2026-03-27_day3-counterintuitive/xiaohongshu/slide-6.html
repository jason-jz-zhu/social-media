<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1440px;
  padding: 100px 80px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.badge {
  display: inline-block;
  background: #7C3AED;
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 500;
  padding: 6px 20px;
  border-radius: 16px;
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 48px;
  align-self: flex-start;
}

.title {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 56px;
}

.list {
  display: flex;
  flex-direction: column;
  flex: 1;
  justify-content: center;
}

.item {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  padding: 28px 0;
}

.item + .item {
  border-top: 1px solid #EBEBEB;
}

.item-number {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: #7C3AED;
  line-height: 1;
  min-width: 56px;
  padding-top: 2px;
}

.item-text {
  flex: 1;
}

.item-title {
  font-size: 34px;
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.4;
  margin-bottom: 6px;
}

.item-desc {
  font-size: 28px;
  color: #888;
  line-height: 1.4;
}

.page-number {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="slide">
  <div class="badge">6点起床学创业 Day 3</div>
  <div class="title">收藏：Day 3 五个核心观点</div>
  <div class="list">
    <div class="item">
      <div class="item-number">1</div>
      <div class="item-text">
        <div class="item-title">创业像滑雪，直觉全是反的</div>
        <div class="item-desc">唯一例外：关于人的判断要信直觉</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">2</div>
      <div class="item-text">
        <div class="item-title">不需要创业知识，需要用户知识</div>
        <div class="item-desc">Zuckerberg不懂融资，但最懂用户</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">3</div>
      <div class="item-text">
        <div class="item-title">增长黑客是扯淡</div>
        <div class="item-desc">用户像鲨鱼，只认有没有肉</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">4</div>
      <div class="item-text">
        <div class="item-title">别刻意想创业点子</div>
        <div class="item-desc">最好的idea都是副业项目长出来的</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">5</div>
      <div class="item-text">
        <div class="item-title">PG的终极建议：去学习</div>
        <div class="item-desc">跟着好奇心走到技术最前沿</div>
      </div>
    </div>
  </div>
  <div class="page-number">6 / 7</div>
</div>
</body>
</html>
