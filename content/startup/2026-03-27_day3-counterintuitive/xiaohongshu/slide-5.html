<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .shark-box {
    background: #1A1A1A;
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 40px;
  }

  .shark-box .quote {
    font-size: 40px;
    font-weight: 700;
    color: #FFFFFF;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .shark-box .quote .purple {
    color: #7C3AED;
  }

  .shark-box .explain {
    font-size: 30px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
  }

  .insight-section {
    margin-bottom: 36px;
  }

  .insight-label {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 500;
    padding: 4px 16px;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .insight-text {
    font-size: 34px;
    color: #333;
    line-height: 1.7;
  }

  .personal-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 28px 32px;
    margin-top: auto;
    margin-bottom: 80px;
  }

  .personal-box .label {
    font-size: 26px;
    font-weight: 700;
    color: #7C3AED;
    margin-bottom: 12px;
  }

  .personal-box p {
    font-size: 32px;
    color: #333;
    line-height: 1.7;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 3</span></div>

    <h1 class="title">增长黑客是扯淡 & 别刻意想点子</h1>

    <div class="shark-box">
      <p class="quote">用户像<span class="purple">鲨鱼</span>：有肉还是没肉</p>
      <p class="explain">套路、话术、黑客技巧都骗不了用户。唯一的增长方式：做出用户真正爱用的东西，然后告诉他们。</p>
    </div>

    <div class="insight-section">
      <div><span class="insight-label">最好的点子怎么来的</span></div>
      <p class="insight-text">Yahoo、Google、Facebook、Apple——全都是从副业项目开始的，没有一个是"我要创业，想个idea"想出来的。好的点子是平时突然想到的，但你其实已经在那个领域泡了很久。</p>
    </div>

    <div class="personal-box">
      <p class="label">我的感受</p>
      <p>做了10年data产品，最好的功能点从来不是规划出来的，都是跟用户聊着聊着突然想到的。在公司"内部创业"也一样——有资源有用户，但核心还是别走流程不做事。</p>
    </div>
  </div>

  <div class="page-number">5 / 7</div>
</body>
</html>
