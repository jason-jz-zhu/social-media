<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1440px;
  padding: 100px 80px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.badge {
  display: inline-block;
  background: #7C3AED;
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 500;
  padding: 6px 20px;
  border-radius: 16px;
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 48px;
  align-self: flex-start;
}

.title {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 700;
  color: #1A1A1A;
  text-align: center;
  margin-bottom: 48px;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
}

.big-quote {
  font-family: 'Noto Serif SC', serif;
  font-size: 64px;
  font-weight: 900;
  color: #7C3AED;
  text-align: center;
  margin-bottom: 16px;
}

.boxes {
  display: flex;
  flex-direction: column;
  gap: 28px;
  width: 100%;
}

.box {
  border-left: 4px solid #7C3AED;
  background: #F5F0FF;
  padding: 24px;
  border-radius: 0 12px 12px 0;
}

.box-title {
  font-size: 36px;
  color: #333;
  font-weight: 500;
  margin-bottom: 8px;
  line-height: 1.4;
}

.box-desc {
  font-size: 30px;
  color: #888;
  line-height: 1.4;
}

.bottom-text {
  font-size: 32px;
  color: #888;
  text-align: center;
  margin-top: 16px;
}

.page-number {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="slide">
  <div class="badge">6点起床学创业 Day 1</div>
  <div class="title">创业的唯一好理由</div>
  <div class="content">
    <div class="big-quote">"你不做不行"</div>
    <div class="boxes">
      <div class="box">
        <div class="box-title">你太痴迷了，不做睡不着</div>
        <div class="box-desc">→ 这种热情能撑过创业最痛苦的时刻</div>
      </div>
      <div class="box">
        <div class="box-title">世界需要这个，而你最适合做</div>
        <div class="box-desc">→ Dustin在Facebook晚上忍不住做Asana原型</div>
      </div>
    </div>
    <div class="bottom-text">如果两个都不是，你的时间花在别处更好</div>
  </div>
  <div class="page-number">5 / 7</div>
</div>
</body>
</html>
