<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 56px;
  }

  .example {
    margin-bottom: 48px;
  }

  .example-label {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 500;
    padding: 4px 16px;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .example-main {
    font-size: 36px;
    color: #333;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .example-sub {
    font-size: 30px;
    color: #888;
    line-height: 1.5;
  }

  .bottom-hook {
    margin-top: auto;
    margin-bottom: 40px;
    font-size: 36px;
    font-weight: 700;
    color: #7C3AED;
    line-height: 1.6;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 1</span></div>

    <h1 class="title">好想法一开始都像坏主意</h1>

    <div class="example">
      <div><span class="example-label">例子一</span></div>
      <p class="example-main">Google — 第13个搜索引擎</p>
      <p class="example-sub">当时：搜索已经做完了，没人需要</p>
    </div>

    <div class="example">
      <div><span class="example-label">例子二</span></div>
      <p class="example-main">Facebook — 只给大学生用的社交网络</p>
      <p class="example-sub">当时：MySpace已经赢了，大学生没钱</p>
    </div>

    <div class="example">
      <div><span class="example-label">例子三</span></div>
      <p class="example-main">Airbnb — 睡陌生人家的沙发</p>
      <p class="example-sub">当时：听起来就很不靠谱</p>
    </div>

    <p class="bottom-hook">如果想法听起来很好，说明太多人会做</p>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
