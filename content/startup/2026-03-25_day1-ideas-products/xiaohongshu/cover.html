<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Day 1 - 好想法都像坏主意</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #1A1A1A;
    position: relative;
  }

  /* Purple accent block */
  .accent-block {
    position: absolute;
    top: -200px;
    right: -150px;
    width: 500px;
    height: 600px;
    background: #7C3AED;
    opacity: 0.08;
    transform: rotate(-15deg);
    border-radius: 60px;
  }

  /* Grain texture overlay */
  .grain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* Purple glow behind Day 1 */
  .glow {
    position: absolute;
    top: 480px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, #7C3AED 0%, transparent 70%);
    filter: blur(120px);
    opacity: 0.4;
    z-index: 0;
  }

  /* Content container */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Series badge */
  .series-badge {
    background: #7C3AED;
    color: #fff;
    font-size: 56px;
    font-weight: 700;
    padding: 14px 48px;
    border-radius: 50px;
    margin-bottom: 80px;
    letter-spacing: 2px;
  }

  /* Day number */
  .day-number {
    font-size: 140px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 50px;
    letter-spacing: 4px;
  }

  /* Subtitle line */
  .subtitle-line {
    font-size: 80px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 70px;
    text-align: center;
  }

  /* Fluorescent marker highlight on 坏主意 */
  .highlight {
    position: relative;
    display: inline;
  }

  .highlight::after {
    content: '';
    position: absolute;
    left: -6px;
    right: -6px;
    bottom: 4px;
    height: 0.45em;
    background: #7C3AED;
    opacity: 0.6;
    z-index: -1;
    border-radius: 4px;
  }

  /* Bottom attribution */
  .attribution {
    font-size: 44px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 1px;
  }

  /* Lightbulb SVG — top right */
  .icon-lightbulb {
    position: absolute;
    top: 100px;
    right: 120px;
    opacity: 0.7;
    z-index: 10;
  }

  /* Clock SVG — top left */
  .icon-clock {
    position: absolute;
    top: 110px;
    left: 110px;
    opacity: 0.5;
    z-index: 10;
  }
</style>
</head>
<body>

  <!-- Background elements -->
  <div class="accent-block"></div>
  <div class="glow"></div>
  <div class="grain"></div>

  <!-- Hand-drawn lightbulb SVG -->
  <svg class="icon-lightbulb" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 10 C30 10 18 26 18 42 C18 54 26 62 32 68 C34 70 36 74 36 78 L36 82 C36 86 40 90 50 90 C60 90 64 86 64 82 L64 78 C64 74 66 70 68 68 C74 62 82 54 82 42 C82 26 70 10 50 10Z" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M38 82 L62 82" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M40 88 L60 88" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M50 10 L50 4" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M82 42 L90 42" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M18 42 L10 42" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M73 19 L78 14" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M27 19 L22 14" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  </svg>

  <!-- Hand-drawn clock/alarm SVG -->
  <svg class="icon-clock" width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="35" cy="38" r="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M35 22 L35 38 L46 44" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M14 14 L22 20" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M56 14 L48 20" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M10 12 L18 8" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M60 12 L52 8" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  </svg>

  <!-- Main content -->
  <div class="content">
    <div class="series-badge">6点起床学创业</div>
    <div class="day-number">Day 1</div>
    <div class="subtitle-line">好想法都像<span class="highlight">坏主意</span></div>
    <div class="attribution">Sam Altman · YC创业课</div>
  </div>

</body>
</html>
