<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Noto Sans', sans-serif;
  }

  .hero {
    position: relative;
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Grain texture overlay */
  .hero::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    z-index: 2;
  }

  /* Purple glow behind title */
  .glow {
    position: absolute;
    width: 600px;
    height: 250px;
    background: #7C3AED;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.3;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 0;
  }

  .series-badge {
    position: absolute;
    top: 32px;
    left: 36px;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 20px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 12px;
    z-index: 3;
    line-height: 1.4;
  }

  .day-label {
    position: absolute;
    top: 36px;
    right: 44px;
    font-size: 36px;
    font-weight: 800;
    color: rgba(255, 255, 255, 0.5);
    z-index: 3;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 900px;
    padding: 0 60px;
  }

  .title {
    font-size: 48px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1.25;
    margin-bottom: 24px;
  }

  .subtitle {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="glow"></div>
    <span class="series-badge">20 Days of YC's Startup Bible</span>
    <span class="day-label">Day 1</span>
    <div class="content">
      <h1 class="title">Why the Best Startup Ideas Sound Terrible</h1>
      <p class="subtitle">Sam Altman &amp; Dustin Moskovitz &middot; YC Lecture 1</p>
    </div>
  </div>
</body>
</html>
