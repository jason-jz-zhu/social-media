<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 56px;
  }

  .requirement {
    margin-bottom: 48px;
  }

  .req-label {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 500;
    padding: 4px 16px;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .req-main {
    font-size: 36px;
    color: #333;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .req-sub {
    font-size: 30px;
    color: #888;
    line-height: 1.5;
  }

  .bottom-hook {
    margin-top: auto;
    margin-bottom: 40px;
    font-size: 36px;
    font-weight: 700;
    color: #7C3AED;
    line-height: 1.6;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 2</span></div>

    <h1 class="title">找合伙人像找James Bond</h1>

    <div class="requirement">
      <div><span class="req-label">条件一</span></div>
      <p class="req-main">聪明（Smart）</p>
      <p class="req-sub">能快速理解复杂问题，举一反三</p>
    </div>

    <div class="requirement">
      <div><span class="req-label">条件二</span></div>
      <p class="req-main">能把事做成（Gets things done）</p>
      <p class="req-sub">不是纸上谈兵，是真的能交付结果</p>
    </div>

    <div class="requirement">
      <div><span class="req-label">条件三</span></div>
      <p class="req-main">愿意长期共事（Want to spend time with）</p>
      <p class="req-sub">创业至少10年，比很多婚姻都长</p>
    </div>

    <p class="bottom-hook">三个都满足？比找老婆还难</p>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
