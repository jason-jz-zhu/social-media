<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 80px;
    align-self: flex-start;
  }

  .big-number {
    font-size: 120px;
    font-weight: 900;
    color: #7C3AED;
    line-height: 1;
    margin-bottom: 40px;
    margin-top: 40px;
  }

  .stat-line {
    font-size: 40px;
    font-weight: 500;
    color: #333;
    margin-bottom: 48px;
    text-align: center;
  }

  .sub-line {
    font-size: 32px;
    color: #888;
    margin-bottom: 32px;
    text-align: center;
    line-height: 1.5;
  }

  .emphasis-line {
    font-size: 36px;
    font-weight: 700;
    color: #7C3AED;
    text-align: center;
    margin-top: 16px;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 2</div>

    <h1 class="title">每天只专注2-3件事</h1>

    <div class="big-number">97</div>

    <p class="stat-line">每100件事，说No 97次</p>

    <p class="sub-line">GenAI让你同时做更多事</p>

    <p class="emphasis-line">但说No依然是最重要的技能</p>
  </div>

  <div class="page-number">5 / 7</div>
</body>
</html>
