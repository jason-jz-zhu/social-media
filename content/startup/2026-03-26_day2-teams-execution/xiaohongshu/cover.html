<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Day 2 - 找合伙人比找老婆难</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #1A1A1A;
    position: relative;
  }

  /* Purple accent block */
  .accent-block {
    position: absolute;
    top: -200px;
    right: -150px;
    width: 500px;
    height: 600px;
    background: #7C3AED;
    opacity: 0.08;
    transform: rotate(-15deg);
    border-radius: 60px;
  }

  /* Grain texture overlay */
  .grain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* Purple glow behind Day 2 */
  .glow {
    position: absolute;
    top: 480px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, #7C3AED 0%, transparent 70%);
    filter: blur(120px);
    opacity: 0.4;
    z-index: 0;
  }

  /* Content container */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Series badge */
  .series-badge {
    background: #7C3AED;
    color: #fff;
    font-size: 56px;
    font-weight: 700;
    padding: 14px 48px;
    border-radius: 50px;
    margin-bottom: 80px;
    letter-spacing: 2px;
  }

  /* Day number */
  .day-number {
    font-size: 140px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 50px;
    letter-spacing: 4px;
  }

  /* Subtitle line */
  .subtitle-line {
    font-size: 80px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 70px;
    text-align: center;
  }

  /* Fluorescent marker highlight on 找老婆 */
  .highlight {
    position: relative;
    display: inline;
  }

  .highlight::after {
    content: '';
    position: absolute;
    left: -6px;
    right: -6px;
    bottom: 4px;
    height: 0.45em;
    background: #7C3AED;
    opacity: 0.6;
    z-index: -1;
    border-radius: 4px;
  }

  /* Bottom attribution */
  .attribution {
    font-size: 44px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 1px;
  }

  /* Handshake SVG — top right */
  .icon-handshake {
    position: absolute;
    top: 100px;
    right: 120px;
    opacity: 0.7;
    z-index: 10;
  }

  /* Target/bullseye SVG — top left */
  .icon-target {
    position: absolute;
    top: 110px;
    left: 110px;
    opacity: 0.5;
    z-index: 10;
  }
</style>
</head>
<body>

  <!-- Background elements -->
  <div class="accent-block"></div>
  <div class="glow"></div>
  <div class="grain"></div>

  <!-- Hand-drawn handshake SVG -->
  <svg class="icon-handshake" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 50 L25 35 L40 42 L55 32 L65 40" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 50 L75 35 L65 40" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M65 40 L72 55 L60 62 L48 55 L40 42" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 55 L42 68 L55 75 L60 62" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M10 50 L8 65 L25 70 L42 68" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 50 L92 65 L75 70 L55 75" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- Hand-drawn target/bullseye SVG -->
  <svg class="icon-target" width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="35" cy="35" r="28" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="35" cy="35" r="18" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="35" cy="35" r="8" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="35" cy="35" r="3" fill="white"/>
  </svg>

  <!-- Main content -->
  <div class="content">
    <div class="series-badge">6点起床学创业</div>
    <div class="day-number">Day 2</div>
    <div class="subtitle-line">找合伙人比<span class="highlight">找老婆</span>难</div>
    <div class="attribution">Sam Altman · YC创业课</div>
  </div>

</body>
</html>
