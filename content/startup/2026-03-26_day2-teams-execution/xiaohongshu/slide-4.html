<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 56px;
  }

  .story-label {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 26px;
    font-weight: 500;
    padding: 4px 16px;
    border-radius: 12px;
    margin-bottom: 24px;
  }

  .story-line {
    font-size: 36px;
    color: #333;
    font-weight: 500;
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .story-quote {
    font-size: 30px;
    color: #888;
    line-height: 1.6;
    margin-top: 16px;
    margin-bottom: 16px;
  }

  .insight-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 24px;
    margin-top: auto;
    margin-bottom: 80px;
  }

  .insight-box p {
    font-size: 36px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.8;
  }

  .insight-box .purple {
    color: #7C3AED;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 2</span></div>

    <h1 class="title">员工少才厉害</h1>

    <div>
      <span class="story-label">Airbnb的故事</span>
    </div>

    <p class="story-line">花了5个月面试第一个员工</p>
    <p class="story-line">第一年只招了2个人</p>
    <p class="story-quote">Brian Chesky问候选人：<br>如果只剩1年生命，你还来吗？</p>

    <div class="insight-box">
      <p>AI时代，这条更成立了</p>
      <p><span class="purple">小团队 + AI</span> > 大团队</p>
    </div>
  </div>

  <div class="page-number">4 / 7</div>
</body>
</html>
