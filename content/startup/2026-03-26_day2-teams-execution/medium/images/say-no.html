<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  background: #F3F0FA;
  font-family: 'Noto Sans', sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
  padding: 50px;
}

.title {
  font-size: 32px;
  font-weight: 800;
  color: #1A1A1A;
  margin-bottom: 30px;
}

.big-number {
  font-size: 160px;
  font-weight: 900;
  color: #7C3AED;
  line-height: 1;
  margin-bottom: 16px;
}

.sub1 {
  font-size: 24px;
  color: #888;
  margin-bottom: 16px;
}

.sub2 {
  font-size: 20px;
  font-weight: 700;
  color: #1A1A1A;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">Focus = Saying No</div>
  <div class="big-number">97</div>
  <div class="sub1">out of 100 things, say no to 97</div>
  <div class="sub2">Only 2-3 things matter each day.</div>
</div>
</body>
</html>
