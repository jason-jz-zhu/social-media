<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  background: #F3F0FA;
  font-family: 'Noto Sans', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.content {
  flex: 1;
  padding: 50px;
  display: flex;
  flex-direction: column;
}

.title {
  font-size: 32px;
  font-weight: 800;
  color: #1A1A1A;
  text-align: center;
  margin-bottom: 50px;
}

.columns {
  display: flex;
  flex: 1;
  align-items: center;
  justify-content: center;
  gap: 0;
}

.column {
  flex: 1;
  text-align: center;
  padding: 0 30px;
}

.column:not(:last-child) {
  border-right: 1px solid #D1D1D1;
}

.check {
  font-size: 28px;
  font-weight: 700;
  color: #7C3AED;
  margin-bottom: 14px;
}

.desc {
  font-size: 16px;
  color: #888;
  line-height: 1.5;
}

.bottom-strip {
  background: #7C3AED;
  padding: 20px 50px;
  text-align: center;
}

.bottom-strip p {
  font-size: 20px;
  color: #fff;
  font-weight: 600;
}
</style>
</head>
<body>
<div class="content">
  <div class="title">The James Bond Test</div>
  <div class="columns">
    <div class="column">
      <div class="check">&#10003; Smart</div>
      <div class="desc">Can they think through complex problems?</div>
    </div>
    <div class="column">
      <div class="check">&#10003; Gets Things Done</div>
      <div class="desc">Do they ship, not just plan?</div>
    </div>
    <div class="column">
      <div class="check">&#10003; Want to Be Around</div>
      <div class="desc">Would you enjoy working together for 10 years?</div>
    </div>
  </div>
</div>
<div class="bottom-strip">
  <p>All three? Harder than finding a spouse.</p>
</div>
</body>
</html>
