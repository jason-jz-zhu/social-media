<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  background: #0F3460;
  font-family: 'Noto Sans', sans-serif;
  overflow: hidden;
}

.hero {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
  border-bottom: 5px solid #7C3AED;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.grain {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.04;
  pointer-events: none;
}

.badge {
  position: absolute;
  top: 40px;
  left: 50px;
  background: #7C3AED;
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  padding: 8px 24px;
  border-radius: 999px;
}

.day {
  position: absolute;
  top: 44px;
  right: 50px;
  font-size: 36px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.5);
}

.glow {
  position: absolute;
  width: 500px;
  height: 200px;
  background: #7C3AED;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.3;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.title {
  font-size: 44px;
  font-weight: 800;
  color: #fff;
  text-align: center;
  max-width: 900px;
  line-height: 1.25;
  position: relative;
  z-index: 1;
}

.subtitle {
  font-size: 22px;
  color: rgba(255, 255, 255, 0.6);
  margin-top: 24px;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
<div class="hero">
  <div class="grain"></div>
  <div class="glow"></div>
  <div class="badge">20 Days of YC's Startup Bible</div>
  <div class="day">Day 2</div>
  <div class="title">Why Finding a Cofounder Is Harder Than Finding a Spouse</div>
  <div class="subtitle">Sam Altman &middot; YC Lecture 2</div>
</div>
</body>
</html>
