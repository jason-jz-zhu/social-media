<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .concept-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .concept-label {
    font-size: 30px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .concept-title {
    font-size: 52px;
    font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 32px;
    line-height: 1.3;
  }

  .concept-desc {
    font-size: 36px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 48px;
  }

  .example-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 28px 24px;
    margin-bottom: 40px;
  }

  .example-box .label {
    font-size: 28px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .example-box p {
    font-size: 34px;
    color: #333;
    line-height: 1.7;
    font-weight: 500;
  }

  .personal-box {
    background: #FAFAFA;
    border-left: 4px solid #DDD;
    padding: 28px 24px;
  }

  .personal-box .label {
    font-size: 28px;
    color: #888;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .personal-box p {
    font-size: 32px;
    color: #555;
    line-height: 1.7;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 4</div>

    <h1 class="title">成为行业里的螺丝钉</h1>

    <div class="concept-section">
      <div class="concept-label">ADORA的做法</div>
      <div class="concept-title">自己去当保洁员</div>
      <div class="concept-desc">为了做家政平台，她不是坐在办公室做调研，而是真的跑去保洁公司当员工、接受培训、上门打扫。只有亲身经历才能理解行业的真实痛点。</div>

      <div class="example-box">
        <div class="label">一句话定位</div>
        <p>"20美元/小时，帮你打扫房子"</p>
        <p>能用一句话说清产品 = 你真正认清了自己在做什么</p>
      </div>

      <div class="personal-box">
        <div class="label">做了10年tech的体会</div>
        <p>AI时代不需要你字面上去扫地，但本质没变：你必须亲身经历自己服务的行业，拿一手资料，不能只看报告。</p>
      </div>
    </div>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
