<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1440px;
  padding: 100px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  text-align: center;
}

.badge {
  display: inline-block;
  background: #7C3AED;
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 500;
  padding: 6px 20px;
  border-radius: 16px;
  font-family: 'Noto Sans SC', sans-serif;
  position: absolute;
  top: 100px;
  left: 80px;
}

.quote-section {
  margin-bottom: 48px;
}

.quote-line {
  font-family: 'Noto Serif SC', serif;
  font-size: 52px;
  font-weight: 900;
  color: #1A1A1A;
  line-height: 1.5;
}

.quote-highlight {
  color: #7C3AED;
}

.quote-attr {
  font-size: 32px;
  color: #888;
  margin-top: 24px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 0;
  width: 400px;
  margin: 48px auto;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: #E0E0E0;
}

.divider-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #7C3AED;
  margin: 0 16px;
}

.cta-section {
  margin-bottom: 56px;
}

.cta-icon {
  margin-bottom: 20px;
}

.cta-question {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.4;
  margin-bottom: 12px;
}

.cta-action {
  font-size: 40px;
  color: #666;
}

.series-info {
  font-size: 30px;
  color: #888;
  margin-bottom: 32px;
}

.hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.hashtag {
  font-size: 30px;
  color: #7C3AED;
  background: rgba(124, 58, 237, 0.06);
  border: 1px solid rgba(124, 58, 237, 0.12);
  border-radius: 24px;
  padding: 8px 20px;
}

.page-number {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="slide">
  <div class="badge">6点起床学创业 Day 4</div>

  <div class="quote-section">
    <div class="quote-line">暂时的broken</div>
    <div class="quote-line"><span class="quote-highlight">好过永远的瘫痪</span></div>
    <div class="quote-attr">— Adora Cheung, YC创业课 Lecture 4</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="cta-section">
    <div class="cta-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M42 6H6C4.34 6 3 7.34 3 9V33C3 34.66 4.34 36 6 36H15L24 45L33 36H42C43.66 36 45 34.66 45 33V9C45 7.34 43.66 6 42 6Z" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="14" cy="21" r="2.5" fill="#7C3AED"/>
        <circle cx="24" cy="21" r="2.5" fill="#7C3AED"/>
        <circle cx="34" cy="21" r="2.5" fill="#7C3AED"/>
      </svg>
    </div>
    <div class="cta-question">你做产品时亲自体验过行业吗？</div>
    <div class="cta-action">评论区聊聊</div>
  </div>

  <div class="series-info">明天 Day 5：Peter Thiel 讲垄断理论</div>

  <div class="hashtags">
    <span class="hashtag">#创业</span>
    <span class="hashtag">#YC</span>
    <span class="hashtag">#6点起床学创业</span>
    <span class="hashtag">#产品</span>
  </div>

  <div class="page-number">7 / 7</div>
</div>
</body>
</html>
