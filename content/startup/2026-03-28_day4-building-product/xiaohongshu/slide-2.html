<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .content {
    font-size: 42px;
    color: #333;
    line-height: 1.75;
    margin-bottom: 60px;
  }

  .content p {
    margin-bottom: 8px;
  }

  .stat-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 32px 28px;
    margin-top: auto;
    margin-bottom: 80px;
  }

  .stat-box p {
    font-size: 36px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.8;
  }

  .stat-box .purple {
    color: #7C3AED;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 4</span></div>

    <h1 class="title">今日拆解</h1>

    <div class="content">
      <p>YC创业课第四节</p>
      <p>主讲：Adora Cheung（Homejoy创始人）</p>
      <p>主题：做产品、聊用户、做增长</p>
    </div>

    <div class="stat-box">
      <p><span class="purple">试了12个想法全失败</span></p>
      <p>Homejoy是第13个</p>
      <p>为了做家政平台，自己去当保洁员</p>
    </div>
  </div>

  <div class="page-number">2 / 7</div>
</body>
</html>
