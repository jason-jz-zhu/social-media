<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .content {
    font-size: 38px;
    color: #333;
    line-height: 1.75;
    margin-bottom: 40px;
  }

  .content p {
    margin-bottom: 8px;
  }

  .speakers {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 40px;
  }

  .speaker-card {
    background: #FAFAFA;
    border-radius: 16px;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .speaker-icon {
    width: 56px;
    height: 56px;
    background: #7C3AED;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 24px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .speaker-info {
    flex: 1;
  }

  .speaker-name {
    font-size: 30px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 4px;
  }

  .speaker-role {
    font-size: 24px;
    color: #888;
  }

  .stat-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 32px 28px;
    margin-top: auto;
    margin-bottom: 80px;
  }

  .stat-box p {
    font-size: 34px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.8;
  }

  .stat-box .purple {
    color: #7C3AED;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div><span class="badge">6点起床学创业 Day 8</span></div>

    <h1 class="title">今日拆解</h1>

    <div class="content">
      <p>YC创业课第八节</p>
      <p>主题：Doing Things That Don't Scale, PR & How to Get Started</p>
    </div>

    <div class="speakers">
      <div class="speaker-card">
        <div class="speaker-icon">ST</div>
        <div class="speaker-info">
          <div class="speaker-name">Stanley Tang</div>
          <div class="speaker-role">DoorDash创始人 — 1小时验证外卖需求</div>
        </div>
      </div>
      <div class="speaker-card">
        <div class="speaker-icon">WW</div>
        <div class="speaker-info">
          <div class="speaker-name">Walker Williams</div>
          <div class="speaker-role">Teespring创始人 — 做不可规模化的事</div>
        </div>
      </div>
      <div class="speaker-card">
        <div class="speaker-icon">JK</div>
        <div class="speaker-info">
          <div class="speaker-name">Justin Kan</div>
          <div class="speaker-role">Twitch/Justin.tv创始人 — PR与媒体策略</div>
        </div>
      </div>
    </div>

    <div class="stat-box">
      <p><span class="purple">核心观点：尽可能长地做不可规模化的事</span></p>
      <p>被迫才放弃，不要主动放弃</p>
      <p>DoorDash：1小时landing page验证需求</p>
    </div>
  </div>

  <div class="page-number">2 / 7</div>
</body>
</html>
