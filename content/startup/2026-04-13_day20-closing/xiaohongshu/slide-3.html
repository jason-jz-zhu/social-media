<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 24px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  /* Transition visual */
  .transition-box {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .transition-flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .transition-stage {
    text-align: center;
    flex: 1;
  }

  .stage-num {
    font-size: 48px;
    font-weight: 900;
    color: #7C3AED;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stage-label {
    font-size: 24px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 4px;
  }

  .stage-desc {
    font-size: 20px;
    color: #888;
  }

  .arrow {
    font-size: 40px;
    color: #7C3AED;
    font-weight: 900;
  }

  .transition-note {
    font-size: 24px;
    color: #666;
    text-align: center;
    line-height: 1.5;
    background: #fff;
    border-radius: 10px;
    padding: 14px 16px;
    border: 2px solid rgba(124, 58, 237, 0.15);
  }

  .transition-note .purple {
    color: #7C3AED;
    font-weight: 700;
  }

  .divider {
    height: 1px;
    background: #EBEBEB;
    margin: 22px 0;
  }

  /* Four failures */
  .failures {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .failure-card {
    background: #FFF5F5;
    border: 2px solid #FEB2B2;
    border-radius: 14px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .failure-num {
    width: 44px;
    height: 44px;
    background: #E53E3E;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .failure-content {
    flex: 1;
  }

  .failure-title {
    font-size: 28px;
    font-weight: 700;
    color: #E53E3E;
    margin-bottom: 4px;
  }

  .failure-desc {
    font-size: 22px;
    color: #555;
    line-height: 1.4;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 20</div>

    <h1 class="title">25人转折点 + 四大管理失败</h1>

    <div class="section-label">25人后：从做产品 → 建公司</div>

    <div class="transition-box">
      <div class="transition-flow">
        <div class="transition-stage">
          <div class="stage-num">&lt;25</div>
          <div class="stage-label">做产品</div>
          <div class="stage-desc">写代码、见用户</div>
        </div>
        <div class="arrow">&rarr;</div>
        <div class="transition-stage">
          <div class="stage-num">25+</div>
          <div class="stage-label">建公司</div>
          <div class="stage-desc">管理、流程、文化</div>
        </div>
      </div>
      <div class="transition-note">AI时代重新定义：<span class="purple">小团队+AI</span> 做大团队的事<br>2014年的25人转折点，2026年可能是50人</div>
    </div>

    <div class="divider"></div>

    <div class="section-label">四大管理失败</div>

    <div class="failures">
      <div class="failure-card">
        <div class="failure-num">1</div>
        <div class="failure-content">
          <div class="failure-title">不敢招高管</div>
          <div class="failure-desc">怕被取代，结果自己扛不住</div>
        </div>
      </div>
      <div class="failure-card">
        <div class="failure-num">2</div>
        <div class="failure-content">
          <div class="failure-title">Hero Mode</div>
          <div class="failure-desc">什么都自己干，团队没有成长空间</div>
        </div>
      </div>
      <div class="failure-card">
        <div class="failure-num">3</div>
        <div class="failure-content">
          <div class="failure-title">Bad Delegation</div>
          <div class="failure-desc">甩手不管，没有follow up和标准</div>
        </div>
      </div>
      <div class="failure-card">
        <div class="failure-num">4</div>
        <div class="failure-content">
          <div class="failure-title">组织系统缺失</div>
          <div class="failure-desc">没有流程、没有文档、靠口头传达</div>
        </div>
      </div>
    </div>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
