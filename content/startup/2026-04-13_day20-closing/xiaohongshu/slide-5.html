<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 24px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  /* Founder psychology */
  .psych-box {
    background: #1A1A1A;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .psych-title {
    font-size: 30px;
    font-weight: 900;
    color: #fff;
    text-align: center;
    margin-bottom: 20px;
  }

  .psych-title .purple {
    color: #B794F4;
  }

  /* Sorrow trough visual */
  .trough-visual {
    position: relative;
    height: 160px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-end;
  }

  .trough-svg {
    width: 100%;
    height: 100%;
  }

  .psych-items {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .psych-item {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .psych-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
    font-weight: 900;
  }

  .psych-icon.warn {
    background: #FC8181;
    color: #fff;
  }

  .psych-icon.good {
    background: #7C3AED;
    color: #fff;
  }

  .psych-text {
    font-size: 26px;
    color: #fff;
    line-height: 1.4;
  }

  .psych-text .purple {
    color: #B794F4;
    font-weight: 700;
  }

  .psych-text .red {
    color: #FC8181;
    font-weight: 700;
  }

  .divider {
    height: 1px;
    background: #EBEBEB;
    margin: 22px 0;
  }

  /* PR/BD + Two rules */
  .rules-box {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .rules-grid {
    display: flex;
    gap: 16px;
  }

  .rule-card {
    flex: 1;
    background: #fff;
    border-radius: 12px;
    padding: 22px 16px;
    text-align: center;
    border: 2px solid rgba(124, 58, 237, 0.15);
  }

  .rule-num {
    font-size: 36px;
    font-weight: 900;
    color: #7C3AED;
    margin-bottom: 10px;
  }

  .rule-title {
    font-size: 26px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .rule-desc {
    font-size: 22px;
    color: #666;
    line-height: 1.4;
  }

  /* Warning pills */
  .warning-pills {
    display: flex;
    gap: 12px;
  }

  .warning-pill {
    flex: 1;
    background: #FFF5F5;
    border: 2px solid #FEB2B2;
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
  }

  .warning-pill-title {
    font-size: 24px;
    font-weight: 700;
    color: #E53E3E;
    margin-bottom: 4px;
  }

  .warning-pill-desc {
    font-size: 20px;
    color: #555;
    line-height: 1.4;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 20</div>

    <h1 class="title">创始人心理 + 两条铁律</h1>

    <div class="section-label">Airbnb 1000天 Sorrow Trough</div>

    <div class="psych-box">
      <div class="psych-title">创始人心理<span class="purple">越来越难</span></div>

      <div class="trough-visual">
        <svg class="trough-svg" viewBox="0 0 860 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 20 Q100 20 200 60 Q350 120 500 110 Q650 100 750 50 Q800 30 860 20" stroke="#7C3AED" stroke-width="4" fill="none"/>
          <path d="M0 20 Q100 20 200 60 Q350 120 500 110 Q650 100 750 50 Q800 30 860 20 L860 140 L0 140Z" fill="url(#grad)" opacity="0.15"/>
          <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="transparent"/></linearGradient></defs>
          <text x="30" y="16" fill="#B794F4" font-size="18" font-weight="700">Launch</text>
          <text x="310" y="136" fill="#FC8181" font-size="18" font-weight="700">Sorrow Trough</text>
          <text x="750" y="16" fill="#68D391" font-size="18" font-weight="700">Growth</text>
          <text x="380" y="80" fill="rgba(255,255,255,0.5)" font-size="16">~1000 days</text>
        </svg>
      </div>

      <div class="psych-items">
        <div class="psych-item">
          <div class="psych-icon warn">!</div>
          <div class="psych-text"><span class="red">失去Focus</span> 是最常见的失败原因</div>
        </div>
        <div class="psych-item">
          <div class="psych-icon good">R</div>
          <div class="psych-text">要<span class="purple">休假</span>，维护自己的状态</div>
        </div>
        <div class="psych-item">
          <div class="psych-icon good">L</div>
          <div class="psych-text">创业很长，但<span class="purple">可以做到</span></div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">PR/BD + 两条铁律</div>

    <div class="rules-box">
      <div class="rules-grid">
        <div class="rule-card">
          <div class="rule-num">PR</div>
          <div class="rule-title">自己定Messaging</div>
          <div class="rule-desc">自己认识记者<br>别全交给PR公司</div>
        </div>
        <div class="rule-card">
          <div class="rule-num">BD</div>
          <div class="rule-title">自己谈合作</div>
          <div class="rule-desc">创始人亲自出面<br>效果完全不一样</div>
        </div>
      </div>
    </div>

    <div class="warning-pills">
      <div class="warning-pill">
        <div class="warning-pill-title">永远不招Professional CEO</div>
        <div class="warning-pill-desc">创始人才是灵魂</div>
      </div>
      <div class="warning-pill">
        <div class="warning-pill-title">MNA谈判是公司杀手</div>
        <div class="warning-pill-desc">分心、消耗、拖垮团队</div>
      </div>
    </div>
  </div>

  <div class="page-number">5 / 7</div>
</body>
</html>
