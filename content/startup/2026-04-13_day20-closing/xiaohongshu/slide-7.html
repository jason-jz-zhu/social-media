<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1440px;
  padding: 100px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  text-align: center;
}

.badge {
  display: inline-block;
  background: #7C3AED;
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 500;
  padding: 6px 20px;
  border-radius: 16px;
  font-family: 'Noto Sans SC', sans-serif;
  position: absolute;
  top: 100px;
  left: 80px;
}

.quote-section {
  margin-bottom: 36px;
}

.quote-line {
  font-family: 'Noto Serif SC', serif;
  font-size: 46px;
  font-weight: 900;
  color: #1A1A1A;
  line-height: 1.5;
}

.quote-highlight {
  color: #7C3AED;
}

.quote-attr {
  font-size: 32px;
  color: #888;
  margin-top: 24px;
}

.divider {
  display: flex;
  align-items: center;
  gap: 0;
  width: 400px;
  margin: 36px auto;
}

.divider-line {
  flex: 1;
  height: 1px;
  background: #E0E0E0;
}

.divider-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #7C3AED;
  margin: 0 16px;
}

/* Series completion */
.completion-section {
  margin-bottom: 32px;
}

.completion-badge {
  display: inline-block;
  background: #1A1A1A;
  color: #fff;
  font-size: 28px;
  font-weight: 700;
  padding: 12px 32px;
  border-radius: 50px;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

.completion-text {
  font-size: 34px;
  color: #555;
  line-height: 1.6;
}

.completion-text .purple {
  color: #7C3AED;
  font-weight: 700;
}

/* CTA section */
.cta-section {
  margin-bottom: 36px;
}

.cta-box {
  background: #F5F0FF;
  border: 2px solid #7C3AED;
  border-radius: 20px;
  padding: 28px 36px;
}

.cta-question {
  font-family: 'Noto Serif SC', serif;
  font-size: 38px;
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.4;
  margin-bottom: 12px;
}

.cta-action {
  font-size: 32px;
  color: #7C3AED;
  font-weight: 700;
}

.cta-sub {
  font-size: 26px;
  color: #888;
  margin-top: 8px;
}

.series-complete {
  font-size: 28px;
  color: #888;
  margin-bottom: 28px;
}

.hashtags {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
}

.hashtag {
  font-size: 30px;
  color: #7C3AED;
  background: rgba(124, 58, 237, 0.06);
  border: 1px solid rgba(124, 58, 237, 0.12);
  border-radius: 24px;
  padding: 8px 20px;
}

.page-number {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="slide">
  <div class="badge">6点起床学创业 Day 20</div>

  <div class="quote-section">
    <div class="quote-line">Don't ever let</div>
    <div class="quote-line">your company be</div>
    <div class="quote-line"><span class="quote-highlight">defined by others</span>.</div>
    <div class="quote-line">Write it down</div>
    <div class="quote-line"><span class="quote-highlight">yourself</span>.</div>
    <div class="quote-attr">-- Sam Altman, YC President</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="completion-section">
    <div class="completion-badge">20 DAYS COMPLETE</div>
    <div class="completion-text">20天，20节课，<span class="purple">完结</span></div>
  </div>

  <div class="cta-section">
    <div class="cta-box">
      <div class="cta-question">想聊聊你的创业想法？</div>
      <div class="cta-action">Calendly在bio里</div>
      <div class="cta-sub">10年tech经验 + MBA视角，帮你拆解</div>
    </div>
  </div>

  <div class="series-complete">6点起床学创业 -- 全系列完结</div>

  <div class="hashtags">
    <span class="hashtag">#创业</span>
    <span class="hashtag">#YC</span>
    <span class="hashtag">#6点起床学创业</span>
    <span class="hashtag">#startup</span>
    <span class="hashtag">#SamAltman</span>
  </div>

  <div class="page-number">7 / 7</div>
</div>
</body>
</html>
