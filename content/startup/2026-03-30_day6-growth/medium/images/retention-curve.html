<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  background: #F3F0FA;
  font-family: 'Noto Sans', sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  padding: 44px 80px;
  width: 100%;
}

.label {
  font-size: 16px;
  font-weight: 700;
  color: #7C3AED;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 14px;
}

.title {
  font-size: 32px;
  font-weight: 800;
  color: #1A1A2E;
  margin-bottom: 36px;
}

.chart-area {
  display: flex;
  gap: 50px;
  justify-content: center;
}

.chart-card {
  flex: 1;
  background: #fff;
  border-radius: 16px;
  padding: 28px 24px;
  position: relative;
  border: 2px solid transparent;
}

.chart-card.good {
  border-color: #7C3AED;
}

.chart-card.bad {
  border-color: #E0E0E0;
}

.card-badge {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 5px 14px;
  border-radius: 50px;
  display: inline-block;
  margin-bottom: 16px;
}

.chart-card.good .card-badge {
  background: #7C3AED;
  color: #fff;
}

.chart-card.bad .card-badge {
  background: #F0F0F0;
  color: #888;
}

.card-title {
  font-size: 20px;
  font-weight: 800;
  color: #1A1A2E;
  margin-bottom: 6px;
}

.card-subtitle {
  font-size: 14px;
  font-weight: 500;
  color: #888;
  margin-bottom: 20px;
}

.curve-container {
  width: 100%;
  height: 150px;
  position: relative;
}

.curve-container svg {
  width: 100%;
  height: 100%;
}

.axis-label {
  font-size: 11px;
  font-weight: 600;
  color: #AAA;
}

.axis-label-y {
  position: absolute;
  top: -4px;
  left: 0;
  font-size: 11px;
  font-weight: 600;
  color: #AAA;
}

.axis-label-x {
  position: absolute;
  bottom: -4px;
  right: 0;
  font-size: 11px;
  font-weight: 600;
  color: #AAA;
}

.verdict {
  margin-top: 14px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
}

.chart-card.good .verdict {
  color: #7C3AED;
}

.chart-card.bad .verdict {
  color: #CC3333;
}

.bottom-text {
  text-align: center;
  margin-top: 28px;
  font-size: 17px;
  font-weight: 600;
  color: #666;
}

.bottom-text strong {
  color: #7C3AED;
}
</style>
</head>
<body>
<div class="container">
  <div class="label">Alex Schultz's Framework</div>
  <div class="title">The Retention Curve Tells You Everything</div>
  <div class="chart-area">
    <div class="chart-card good">
      <div class="card-badge">Product-Market Fit</div>
      <div class="card-title">Curve Flattens</div>
      <div class="card-subtitle">Asymptotes parallel to X-axis</div>
      <div class="curve-container">
        <div class="axis-label-y">% Active</div>
        <div class="axis-label-x">Time &rarr;</div>
        <svg viewBox="0 0 400 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Axes -->
          <line x1="40" y1="10" x2="40" y2="125" stroke="#DDD" stroke-width="1.5"/>
          <line x1="40" y1="125" x2="390" y2="125" stroke="#DDD" stroke-width="1.5"/>
          <!-- Grid lines -->
          <line x1="40" y1="40" x2="390" y2="40" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4"/>
          <line x1="40" y1="70" x2="390" y2="70" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4"/>
          <line x1="40" y1="100" x2="390" y2="100" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4"/>
          <!-- Curve that flattens -->
          <path d="M40,15 C80,15 100,50 140,65 C180,78 220,85 260,88 C300,90 340,91 390,91" stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- Flat zone highlight -->
          <rect x="230" y="85" width="160" height="12" rx="2" fill="rgba(124,58,237,0.1)"/>
          <text x="310" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">Retained users stay</text>
        </svg>
      </div>
      <div class="verdict">Ready to grow</div>
    </div>
    <div class="chart-card bad">
      <div class="card-badge">No PMF</div>
      <div class="card-title">Curve Hits Zero</div>
      <div class="card-subtitle">Trends toward X-axis</div>
      <div class="curve-container">
        <div class="axis-label-y">% Active</div>
        <div class="axis-label-x">Time &rarr;</div>
        <svg viewBox="0 0 400 140" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Axes -->
          <line x1="40" y1="10" x2="40" y2="125" stroke="#DDD" stroke-width="1.5"/>
          <line x1="40" y1="125" x2="390" y2="125" stroke="#DDD" stroke-width="1.5"/>
          <!-- Grid lines -->
          <line x1="40" y1="40" x2="390" y2="40" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4"/>
          <line x1="40" y1="70" x2="390" y2="70" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4"/>
          <line x1="40" y1="100" x2="390" y2="100" stroke="#F0F0F0" stroke-width="1" stroke-dasharray="4"/>
          <!-- Curve that goes to zero -->
          <path d="M40,15 C80,30 100,60 140,80 C180,95 220,108 260,115 C300,120 340,123 390,124" stroke="#CC3333" stroke-width="3" fill="none" stroke-linecap="round"/>
          <!-- Warning zone -->
          <text x="310" y="108" text-anchor="middle" font-size="11" font-weight="600" fill="#CC3333">Everyone leaves</text>
        </svg>
      </div>
      <div class="verdict">Fix the product first</div>
    </div>
  </div>
  <div class="bottom-text"><strong>10,000 users is enough</strong> to see which curve you have.</div>
</div>
</body>
</html>
