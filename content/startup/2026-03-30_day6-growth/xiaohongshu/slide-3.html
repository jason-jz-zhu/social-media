<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .concept-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .concept-label {
    font-size: 30px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .concept-title {
    font-size: 52px;
    font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 32px;
    line-height: 1.3;
  }

  .concept-desc {
    font-size: 36px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 48px;
  }

  .curve-diagram {
    position: relative;
    background: #FAFAFA;
    border-radius: 16px;
    padding: 40px 32px;
    margin-bottom: 40px;
  }

  .curve-diagram .axis-label-y {
    position: absolute;
    left: 16px;
    top: 40px;
    font-size: 22px;
    color: #999;
    writing-mode: vertical-rl;
    letter-spacing: 4px;
  }

  .curve-diagram .axis-label-x {
    position: absolute;
    right: 32px;
    bottom: 16px;
    font-size: 22px;
    color: #999;
  }

  .curve-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    padding-left: 40px;
  }

  .curve-row:last-child {
    margin-bottom: 0;
  }

  .curve-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .curve-icon.good {
    background: #7C3AED;
  }

  .curve-icon.bad {
    background: #EF4444;
  }

  .curve-label {
    font-size: 28px;
    font-weight: 700;
    min-width: 120px;
  }

  .curve-label.good {
    color: #7C3AED;
  }

  .curve-label.bad {
    color: #EF4444;
  }

  .curve-desc {
    font-size: 26px;
    color: #666;
  }

  .curve-visual {
    display: flex;
    justify-content: center;
    margin: 32px 0;
  }

  .insight-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 28px 24px;
  }

  .insight-box .label {
    font-size: 28px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .insight-box p {
    font-size: 32px;
    color: #555;
    line-height: 1.7;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 6</div>

    <h1 class="title">留存曲线决定一切</h1>

    <div class="concept-section">
      <div class="concept-label">SCHULTZ的第一原则</div>
      <div class="concept-title">留存不收敛？别做增长了</div>
      <div class="concept-desc">画出你的cohort留存曲线。如果它不趋近于平行X轴的渐近线，说明你还没有PMF，所有拉新都是往漏桶灌水。</div>

      <div class="curve-diagram">
        <div class="axis-label-y">留存率</div>
        <div class="axis-label-x">时间</div>

        <svg width="840" height="240" viewBox="0 0 840 240" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block; margin: 0 auto;">
          <!-- Good curve (purple solid): drops quickly then flattens high -->
          <path d="M40 15 Q80 30 120 42 Q180 55 240 58 Q340 62 460 63 Q580 63 700 63 L800 63" stroke="#7C3AED" stroke-width="5" stroke-linecap="round" fill="none"/>
          <!-- Bad curve (red dashed): keeps dropping to near bottom -->
          <path d="M40 15 Q100 55 180 105 Q280 155 400 185 Q520 205 640 218 Q720 225 800 230" stroke="#EF4444" stroke-width="5" stroke-linecap="round" stroke-dasharray="14 10" fill="none"/>
          <!-- Asymptote line for good curve -->
          <line x1="240" y1="63" x2="800" y2="63" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.35"/>
        </svg>

        <div class="curve-row">
          <div class="curve-icon good"></div>
          <div class="curve-label good">有PMF</div>
          <div class="curve-desc">曲线收敛，趋近渐近线</div>
        </div>
        <div class="curve-row">
          <div class="curve-icon bad"></div>
          <div class="curve-label bad">没有PMF</div>
          <div class="curve-desc">曲线持续下降，趋近零</div>
        </div>
      </div>

      <div class="insight-box">
        <div class="label">小样本就够了</div>
        <p>只需1万用户就能看清曲线走向。不用等到规模很大，早期就能判断产品行不行。</p>
      </div>
    </div>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
