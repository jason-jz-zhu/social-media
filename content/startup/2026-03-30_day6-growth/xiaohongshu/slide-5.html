<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .content-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .section-block {
    margin-bottom: 48px;
  }

  .section-label {
    font-size: 28px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .section-title {
    font-size: 44px;
    font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .section-desc {
    font-size: 32px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .compare-row {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }

  .compare-box {
    flex: 1;
    padding: 24px 20px;
    border-radius: 12px;
    text-align: center;
  }

  .compare-box.focus {
    background: #F5F0FF;
    border: 3px solid #7C3AED;
  }

  .compare-box.skip {
    background: #F9F9F9;
    border: 3px solid #DDD;
  }

  .compare-box .box-title {
    font-size: 30px;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .compare-box.focus .box-title {
    color: #7C3AED;
  }

  .compare-box.skip .box-title {
    color: #999;
  }

  .compare-box .box-desc {
    font-size: 26px;
    color: #555;
    line-height: 1.5;
  }

  .seo-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 28px 24px;
    margin-bottom: 24px;
  }

  .seo-box .seo-title {
    font-size: 32px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 16px;
  }

  .seo-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .seo-item {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .seo-item .num {
    font-size: 28px;
    font-weight: 900;
    color: #7C3AED;
    min-width: 32px;
  }

  .seo-item .text {
    font-size: 28px;
    color: #333;
    font-weight: 500;
  }

  .seo-result {
    font-size: 30px;
    color: #7C3AED;
    font-weight: 700;
    margin-top: 16px;
  }

  .personal-box {
    background: #FAFAFA;
    border-left: 4px solid #DDD;
    padding: 24px 24px;
  }

  .personal-box .label {
    font-size: 26px;
    color: #888;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .personal-box p {
    font-size: 30px;
    color: #555;
    line-height: 1.7;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 6</div>

    <h1 class="title">增长的隐藏金矿</h1>

    <div class="content-section">
      <div class="section-block">
        <div class="section-label">反常识</div>
        <div class="section-title">关注边缘用户，不是Power User</div>
        <div class="section-desc">增长来自那些即将流失的人，而不是最活跃的人。</div>

        <div class="compare-row">
          <div class="compare-box focus">
            <div class="box-title">边缘用户</div>
            <div class="box-desc">没收到通知<br>没找到朋友<br>即将流失</div>
          </div>
          <div class="compare-box skip">
            <div class="box-title">Power User</div>
            <div class="box-desc">已经爱你了<br>不需要你优化<br>自然会留下</div>
          </div>
        </div>
      </div>

      <div class="section-block">
        <div class="section-label">SEO杠杆</div>
        <div class="seo-box">
          <div class="seo-title">SEO三件事</div>
          <div class="seo-list">
            <div class="seo-item">
              <div class="num">1</div>
              <div class="text">关键词研究</div>
            </div>
            <div class="seo-item">
              <div class="num">2</div>
              <div class="text">外链权威（反向链接）</div>
            </div>
            <div class="seo-item">
              <div class="num">3</div>
              <div class="text">内部链接分发</div>
            </div>
          </div>
          <div class="seo-result">Facebook改目录结构 → SEO流量涨100x</div>
        </div>
      </div>

      <div class="personal-box">
        <div class="label">个人感触</div>
        <p>做了10年data，SEO的杠杆效应我深有体会。现在AI+SEO的结合，用AI做关键词研究和内容优化，可能是创业者最容易拿到的增长杠杆。</p>
      </div>
    </div>
  </div>

  <div class="page-number">5 / 7</div>
</body>
</html>
