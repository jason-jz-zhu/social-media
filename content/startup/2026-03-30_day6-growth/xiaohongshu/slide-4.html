<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .concept-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .concept-label {
    font-size: 30px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .concept-title {
    font-size: 48px;
    font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 24px;
    line-height: 1.3;
  }

  .concept-desc {
    font-size: 34px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .metric-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 40px;
  }

  .metric-card {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
  }

  .metric-card .company {
    font-size: 28px;
    font-weight: 900;
    color: #7C3AED;
    margin-bottom: 8px;
  }

  .metric-card .metric {
    font-size: 32px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 4px;
  }

  .metric-card .note {
    font-size: 24px;
    color: #888;
  }

  .divider-label {
    font-size: 30px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 16px;
    margin-top: 12px;
    letter-spacing: 2px;
  }

  .magic-title {
    font-size: 44px;
    font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .magic-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 32px;
  }

  .magic-item {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #FAFAFA;
    padding: 20px 24px;
    border-radius: 12px;
    border-left: 4px solid #7C3AED;
  }

  .magic-item .company {
    font-size: 28px;
    font-weight: 700;
    color: #7C3AED;
    min-width: 120px;
  }

  .magic-item .moment {
    font-size: 28px;
    color: #333;
    font-weight: 500;
  }

  .insight-box {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 24px 24px;
  }

  .insight-box p {
    font-size: 30px;
    color: #555;
    line-height: 1.7;
    font-weight: 500;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 6</div>

    <h1 class="title">北极星指标 + Magic Moment</h1>

    <div class="concept-section">
      <div class="concept-label">北极星指标</div>
      <div class="concept-title">CEO必须亲自选、亲自盯</div>
      <div class="concept-desc">不要选虚荣指标。选那个最能代表用户真实价值的数字。</div>

      <div class="metric-grid">
        <div class="metric-card">
          <div class="company">Facebook</div>
          <div class="metric">MAU</div>
          <div class="note">不是注册数</div>
        </div>
        <div class="metric-card">
          <div class="company">eBay</div>
          <div class="metric">GMV</div>
          <div class="note">不是收入</div>
        </div>
        <div class="metric-card">
          <div class="company">Airbnb</div>
          <div class="metric">Nights Booked</div>
          <div class="note">不是房源数</div>
        </div>
        <div class="metric-card">
          <div class="company">WhatsApp</div>
          <div class="metric">Sends</div>
          <div class="note">不是下载量</div>
        </div>
      </div>

      <div class="divider-label">MAGIC MOMENT</div>
      <div class="magic-title">让用户尽快到达这个瞬间</div>

      <div class="magic-list">
        <div class="magic-item">
          <div class="company">Facebook</div>
          <div class="moment">看到朋友的脸（10好友/14天）</div>
        </div>
        <div class="magic-item">
          <div class="company">eBay</div>
          <div class="moment">找到独一无二的收藏品</div>
        </div>
        <div class="magic-item">
          <div class="company">Airbnb</div>
          <div class="moment">推开那扇门的瞬间</div>
        </div>
      </div>

      <div class="insight-box">
        <p>一切增长策略的核心：缩短用户到达Magic Moment的路径。</p>
      </div>
    </div>
  </div>

  <div class="page-number">4 / 7</div>
</body>
</html>
