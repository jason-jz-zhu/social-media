<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Day 14 - CEO是编辑不是写手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #1A1A1A;
    position: relative;
  }

  .accent-block {
    position: absolute;
    top: -200px;
    right: -150px;
    width: 500px;
    height: 600px;
    background: #7C3AED;
    opacity: 0.08;
    transform: rotate(-15deg);
    border-radius: 60px;
  }

  .grain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  .glow {
    position: absolute;
    top: 480px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, #7C3AED 0%, transparent 70%);
    filter: blur(120px);
    opacity: 0.4;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .series-badge {
    background: #7C3AED;
    color: #fff;
    font-size: 56px;
    font-weight: 700;
    padding: 14px 48px;
    border-radius: 50px;
    margin-bottom: 80px;
    letter-spacing: 2px;
  }

  .day-number {
    font-size: 140px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    margin-bottom: 50px;
    letter-spacing: 4px;
  }

  .subtitle-line {
    font-size: 80px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 70px;
    text-align: center;
  }

  .highlight {
    position: relative;
    display: inline;
  }

  .highlight::after {
    content: '';
    position: absolute;
    left: -6px;
    right: -6px;
    bottom: 4px;
    height: 0.45em;
    background: #7C3AED;
    opacity: 0.6;
    z-index: -1;
    border-radius: 4px;
  }

  .attribution {
    font-size: 44px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 1px;
  }

  /* Lightbulb icon -- top right */
  .icon-lightbulb {
    position: absolute;
    top: 100px;
    right: 120px;
    opacity: 0.7;
    z-index: 10;
  }

  /* Clock icon -- top left */
  .icon-clock {
    position: absolute;
    top: 110px;
    left: 110px;
    opacity: 0.5;
    z-index: 10;
  }
</style>
</head>
<body>

  <div class="accent-block"></div>
  <div class="glow"></div>
  <div class="grain"></div>

  <!-- Lightbulb icon doodle -->
  <svg class="icon-lightbulb" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 15C35 15 24 27 24 40C24 50 30 58 38 62V72C38 74 40 76 42 76H58C60 76 62 74 62 72V62C70 58 76 50 76 40C76 27 65 15 50 15Z" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="42" y1="82" x2="58" y2="82" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="88" x2="56" y2="88" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="40" x2="50" y2="55" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="42" y1="47" x2="50" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="58" y1="47" x2="50" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <!-- Clock doodle -->
  <svg class="icon-clock" width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="35" cy="35" r="28" stroke="white" stroke-width="3.5"/>
    <line x1="35" y1="35" x2="35" y2="18" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="35" x2="48" y2="35" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="35" cy="35" r="3" fill="white"/>
  </svg>

  <div class="content">
    <div class="series-badge">6点起床学创业</div>
    <div class="day-number">Day 14</div>
    <div class="subtitle-line">CEO是<span class="highlight">编辑</span><br>不是写手</div>
    <div class="attribution">Keith Rabois — 前Square/LinkedIn/PayPal</div>
  </div>

</body>
</html>
