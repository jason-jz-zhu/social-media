<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 24px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  /* Delaware comparison */
  .compare-row {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }

  .compare-card {
    flex: 1;
    border-radius: 16px;
    padding: 28px 20px;
  }

  .compare-card.bad {
    background: #FFF5F5;
    border: 2px solid #FEB2B2;
  }

  .compare-card.good {
    background: #F5F0FF;
    border: 2px solid #7C3AED;
  }

  .compare-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 14px;
    text-align: center;
  }

  .compare-card.bad .compare-title { color: #E53E3E; }
  .compare-card.good .compare-title { color: #7C3AED; }

  .compare-example {
    font-size: 24px;
    color: #555;
    line-height: 1.7;
    text-align: center;
  }

  .compare-example .bold {
    font-weight: 700;
    color: #333;
  }

  .compare-result {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-top: 10px;
  }

  .compare-card.bad .compare-result { color: #E53E3E; }
  .compare-card.good .compare-result { color: #7C3AED; }

  .warning-box {
    background: #1A1A1A;
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
    margin-bottom: 20px;
  }

  .warning-text {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.5;
  }

  .warning-text .red {
    color: #FC8181;
  }

  .warning-text .purple {
    color: #B794F4;
  }

  .divider {
    height: 1px;
    background: #EBEBEB;
    margin: 22px 0;
  }

  /* Equity section */
  .equity-box {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .equity-formula {
    font-size: 36px;
    font-weight: 900;
    color: #1A1A1A;
    text-align: center;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .equity-formula .purple {
    color: #7C3AED;
  }

  .equity-formula .strike {
    text-decoration: line-through;
    color: #AAA;
  }

  .equity-desc {
    font-size: 24px;
    color: #555;
    text-align: center;
    line-height: 1.6;
  }

  .yc-box {
    background: #FAFAFA;
    border-radius: 14px;
    padding: 22px 24px;
  }

  .yc-text {
    font-size: 26px;
    color: #333;
    line-height: 1.6;
    text-align: center;
  }

  .yc-text .bold {
    font-weight: 700;
  }

  .yc-text .purple {
    color: #7C3AED;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 18</div>

    <h1 class="title">注册 + 股权分配</h1>

    <div class="section-label">注册公司：别在这件事上"创新"</div>

    <div class="compare-row">
      <div class="compare-card bad">
        <div class="compare-title">花哨结构</div>
        <div class="compare-example">
          复杂的持股架构<br>
          "特殊"条款设计<br>
          多层嵌套实体
        </div>
        <div class="compare-result">浪费 $500K</div>
      </div>
      <div class="compare-card good">
        <div class="compare-title">Vanilla Standard</div>
        <div class="compare-example">
          <span class="bold">Delaware C-Corp</span><br>
          标准文件模板<br>
          所有投资人都认
        </div>
        <div class="compare-result">省钱省时间</div>
      </div>
    </div>

    <div class="warning-box">
      <div class="warning-text">真实案例：创始人花 <span class="red">$500K</span> 搞花哨结构<br>最后<span class="purple">全部推倒重来</span></div>
    </div>

    <div class="divider"></div>

    <div class="section-label">股权：执行 > 想法</div>

    <div class="equity-box">
      <div class="equity-formula">
        <span class="strike">想法</span> = 0<br>
        <span class="purple">执行</span> = 一切
      </div>
      <div class="equity-desc">早期的"想法"在后面会变得一文不值<br>股权应该反映谁在做事</div>
    </div>

    <div class="yc-box">
      <div class="yc-text">YC投过的<span class="purple">顶级公司</span><br>没有一家是<span class="bold">严重不平等分配</span>的<br>建议：<span class="purple">尽量平等</span></div>
    </div>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
