<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1440px;
  padding: 100px 80px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.badge {
  display: inline-block;
  background: #7C3AED;
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 500;
  padding: 6px 20px;
  border-radius: 16px;
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 48px;
  align-self: flex-start;
}

.title {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 56px;
}

.list {
  display: flex;
  flex-direction: column;
  flex: 1;
  justify-content: center;
}

.item {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  padding: 24px 0;
}

.item + .item {
  border-top: 1px solid #EBEBEB;
}

.item-number {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: #7C3AED;
  line-height: 1;
  min-width: 56px;
  padding-top: 2px;
}

.item-text {
  flex: 1;
}

.item-title {
  font-size: 32px;
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.4;
  margin-bottom: 4px;
}

.item-desc {
  font-size: 26px;
  color: #888;
  line-height: 1.4;
}

.page-number {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="slide">
  <div class="badge">6点起床学创业 Day 12</div>
  <div class="title">收藏：Day 12 七个核心观点</div>
  <div class="list">
    <div class="item">
      <div class="item-number">1</div>
      <div class="item-text">
        <div class="item-title">企业IT=$3.7T/年，是消费者的22倍</div>
        <div class="item-desc">企业客户为价值付费，不是为省钱</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">2</div>
      <div class="item-text">
        <div class="item-title">技术断层 = 创业机会</div>
        <div class="item-desc">"可能做到的"vs"实际在做的"差距最大时入场</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">3</div>
      <div class="item-text">
        <div class="item-title">故意从小切口开始</div>
        <div class="item-desc">ZenPayroll只做发薪，PlanGrid只做蓝图</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">4</div>
      <div class="item-text">
        <div class="item-title">找不对称优势</div>
        <div class="item-desc">做大公司做不了的事，Zenefits免费送HR软件</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">5</div>
      <div class="item-text">
        <div class="item-title">找边缘客户</div>
        <div class="item-desc">活在未来的客户告诉你缺什么</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">6</div>
      <div class="item-text">
        <div class="item-title">听问题不照搬方案</div>
        <div class="item-desc">模块化不定制化，API平台思维</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">7</div>
      <div class="item-text">
        <div class="item-title">产品自己卖自己但仍需销售</div>
        <div class="item-desc">消费者体验 + domain销售</div>
      </div>
    </div>
  </div>
  <div class="page-number">6 / 7</div>
</div>
</body>
</html>
