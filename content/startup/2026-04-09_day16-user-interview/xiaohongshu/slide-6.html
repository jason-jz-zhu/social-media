<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1440px;
  padding: 100px 80px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.badge {
  display: inline-block;
  background: #7C3AED;
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 500;
  padding: 6px 20px;
  border-radius: 16px;
  font-family: 'Noto Sans SC', sans-serif;
  margin-bottom: 48px;
  align-self: flex-start;
}

.title {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 56px;
}

.list {
  display: flex;
  flex-direction: column;
  flex: 1;
  justify-content: center;
}

.item {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  padding: 22px 0;
}

.item + .item {
  border-top: 1px solid #EBEBEB;
}

.item-number {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 48px;
  font-weight: 900;
  color: #7C3AED;
  line-height: 1;
  min-width: 56px;
  padding-top: 2px;
}

.item-text {
  flex: 1;
}

.item-title {
  font-size: 30px;
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.4;
  margin-bottom: 4px;
}

.item-desc {
  font-size: 24px;
  color: #888;
  line-height: 1.4;
}

.page-number {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="slide">
  <div class="badge">6点起床学创业 Day 16</div>
  <div class="title">收藏：Day 16 八个核心观点</div>
  <div class="list">
    <div class="item">
      <div class="item-number">1</div>
      <div class="item-text">
        <div class="item-title">跟谁聊比问什么重要得多</div>
        <div class="item-desc">Twitch聚焦主播不是观众，谁是真正用户没有公式</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">2</div>
      <div class="item-text">
        <div class="item-title">三类人都要聊</div>
        <div class="item-desc">现有用户、竞品用户、非用户，反馈完全不同</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">3</div>
      <div class="item-text">
        <div class="item-title">不要展示你的产品</div>
        <div class="item-desc">了解用户脑子里已有的，不要污染数据</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">4</div>
      <div class="item-text">
        <div class="item-title">问行为不问功能</div>
        <div class="item-desc">"你现在怎么做X？" 功能是你的工作</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">5</div>
      <div class="item-text">
        <div class="item-title">用户说要的不等于你该做的</div>
        <div class="item-desc">现有用户要小功能，竞品用户要核心价值</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">6</div>
      <div class="item-text">
        <div class="item-title">6-8个人就够</div>
        <div class="item-desc">多样性比数量重要</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">7</div>
      <div class="item-text">
        <div class="item-title">验证排序：钱 > demo > 描述</div>
        <div class="item-desc">付钱是终极验证，描述功能问好不好=假阳性</div>
      </div>
    </div>
    <div class="item">
      <div class="item-number">8</div>
      <div class="item-text">
        <div class="item-title">录音不做笔记</div>
        <div class="item-desc">回放给团队比PPT有说服力</div>
      </div>
    </div>
  </div>
  <div class="page-number">6 / 7</div>
</div>
</body>
</html>
