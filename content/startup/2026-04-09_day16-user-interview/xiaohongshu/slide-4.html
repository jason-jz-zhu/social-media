<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 24px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  /* Do / Don't comparison */
  .compare-row {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }

  .compare-card {
    flex: 1;
    border-radius: 16px;
    padding: 24px 20px;
  }

  .compare-card.bad {
    background: #FFF5F5;
    border: 2px solid #FEB2B2;
  }

  .compare-card.good {
    background: #F5F0FF;
    border: 2px solid #7C3AED;
  }

  .compare-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 14px;
    text-align: center;
  }

  .compare-card.bad .compare-title { color: #E53E3E; }
  .compare-card.good .compare-title { color: #7C3AED; }

  .compare-points {
    font-size: 24px;
    color: #555;
    line-height: 1.7;
    padding: 0 4px;
  }

  .compare-points .bold {
    font-weight: 700;
    color: #333;
  }

  .reason-box {
    background: #FAFAFA;
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 20px;
  }

  .reason-text {
    font-size: 26px;
    color: #333;
    line-height: 1.6;
    text-align: center;
  }

  .reason-text .purple {
    color: #7C3AED;
    font-weight: 700;
  }

  .divider {
    height: 1px;
    background: #EBEBEB;
    margin: 22px 0;
  }

  /* Behavior questions */
  .question-box {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 16px;
  }

  .question-main {
    font-size: 30px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
    margin-bottom: 14px;
    text-align: center;
  }

  .question-main .purple {
    color: #7C3AED;
  }

  .question-examples {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .q-example {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .q-icon {
    font-size: 24px;
    min-width: 28px;
    padding-top: 2px;
  }

  .q-bad { color: #E53E3E; }
  .q-good { color: #48BB78; }

  .q-text {
    font-size: 26px;
    color: #333;
    line-height: 1.5;
  }

  .q-text .bold {
    font-weight: 700;
  }

  .q-text .strike {
    text-decoration: line-through;
    color: #AAA;
  }

  /* Recording tip */
  .tip-box {
    background: #1A1A1A;
    border-radius: 12px;
    padding: 20px 24px;
    text-align: center;
  }

  .tip-text {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    line-height: 1.5;
  }

  .tip-text .purple {
    color: #B794F4;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 16</div>

    <h1 class="title">不要展示产品 + 问行为不问功能</h1>

    <div class="section-label">反常识：不要展示你的产品</div>

    <div class="compare-row">
      <div class="compare-card bad">
        <div class="compare-title">常见做法</div>
        <div class="compare-points">
          - 展示产品原型<br>
          - 问"你觉得<span class="bold">好不好</span>"<br>
          - 引导用户<span class="bold">评价</span>你的方案
        </div>
      </div>
      <div class="compare-card good">
        <div class="compare-title">正确做法</div>
        <div class="compare-points">
          - 不展示任何东西<br>
          - 了解用户<span class="bold">已有的</span>认知<br>
          - 让用户描述<span class="bold">自己的行为</span>
        </div>
      </div>
    </div>

    <div class="reason-box">
      <div class="reason-text">展示产品 = <span class="purple">污染数据</span><br>你是来了解用户脑子里的东西，不是来推销的</div>
    </div>

    <div class="divider"></div>

    <div class="section-label">问行为，不问功能</div>

    <div class="question-box">
      <div class="question-main">功能是<span class="purple">你的工作</span>，不是用户的</div>
      <div class="question-examples">
        <div class="q-example">
          <div class="q-icon q-bad">X</div>
          <div class="q-text"><span class="strike">"你想要什么功能？"</span></div>
        </div>
        <div class="q-example">
          <div class="q-icon q-bad">X</div>
          <div class="q-text"><span class="strike">"如果有X功能你会用吗？"</span></div>
        </div>
        <div class="q-example">
          <div class="q-icon q-good">O</div>
          <div class="q-text"><span class="bold">"你现在怎么做X？"</span></div>
        </div>
        <div class="q-example">
          <div class="q-icon q-good">O</div>
          <div class="q-text"><span class="bold">"上次遇到这个问题你怎么解决的？"</span></div>
        </div>
      </div>
    </div>

    <div class="tip-box">
      <div class="tip-text"><span class="purple">录音不做笔记</span> — 回放给团队比PPT有说服力</div>
    </div>
  </div>

  <div class="page-number">4 / 7</div>
</body>
</html>
