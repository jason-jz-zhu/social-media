<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 60px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .concept-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .concept-label {
    font-size: 30px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }

  .concept-title {
    font-size: 52px;
    font-weight: 900;
    color: #1A1A1A;
    margin-bottom: 32px;
    line-height: 1.3;
  }

  .concept-desc {
    font-size: 36px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .circle-diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 40px;
    padding: 32px 0;
  }

  .circle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 3px solid #7C3AED;
    text-align: center;
  }

  .circle.small {
    width: 160px;
    height: 160px;
    background: #7C3AED;
    color: #fff;
  }

  .circle.medium {
    width: 200px;
    height: 200px;
    background: rgba(124, 58, 237, 0.15);
    color: #1A1A1A;
  }

  .circle.large {
    width: 240px;
    height: 240px;
    background: rgba(124, 58, 237, 0.06);
    color: #1A1A1A;
  }

  .circle .name {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
  }

  .circle .desc {
    font-size: 22px;
    opacity: 0.8;
    margin-top: 4px;
  }

  .arrow {
    font-size: 36px;
    color: #7C3AED;
    font-weight: 700;
  }

  .example-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 40px;
  }

  .example-item {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #F5F0FF;
    padding: 20px 24px;
    border-radius: 12px;
  }

  .example-item .company {
    font-size: 30px;
    font-weight: 700;
    color: #7C3AED;
    min-width: 140px;
  }

  .example-item .start {
    font-size: 28px;
    color: #333;
    font-weight: 500;
  }

  .personal-box {
    background: #FAFAFA;
    border-left: 4px solid #DDD;
    padding: 28px 24px;
  }

  .personal-box .label {
    font-size: 28px;
    color: #888;
    font-weight: 500;
    margin-bottom: 12px;
  }

  .personal-box p {
    font-size: 32px;
    color: #555;
    line-height: 1.7;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 5</div>

    <h1 class="title">从小池塘开始，同心圆扩张</h1>

    <div class="concept-section">
      <div class="concept-label">THIEL的策略</div>
      <div class="concept-title">先在小市场当绝对的大鱼</div>
      <div class="concept-desc">不要一上来就瞄准大市场。找到你的"2万人"，先拿下，再一圈一圈往外扩。</div>

      <div class="circle-diagram">
        <div class="circle small">
          <div class="name">小池塘</div>
          <div class="desc">垄断</div>
        </div>
        <div class="arrow">→</div>
        <div class="circle medium">
          <div class="name">相邻市场</div>
          <div class="desc">扩张</div>
        </div>
        <div class="arrow">→</div>
        <div class="circle large">
          <div class="name">大市场</div>
          <div class="desc">主导</div>
        </div>
      </div>

      <div class="example-list">
        <div class="example-item">
          <div class="company">Amazon</div>
          <div class="start">从书开始</div>
        </div>
        <div class="example-item">
          <div class="company">PayPal</div>
          <div class="start">从eBay 2万Power Seller开始</div>
        </div>
        <div class="example-item">
          <div class="company">Facebook</div>
          <div class="start">从哈佛1万人开始</div>
        </div>
      </div>

      <div class="personal-box">
        <div class="label">这是每个人都能做到的</div>
        <p>不需要一上来做大平台。找到你的小池塘，先拿下，这才是最actionable的起点。</p>
      </div>
    </div>
  </div>

  <div class="page-number">4 / 7</div>
</body>
</html>
