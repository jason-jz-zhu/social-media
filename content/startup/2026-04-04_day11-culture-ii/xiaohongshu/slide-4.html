<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 24px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  /* Comparison cards */
  .compare-box {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }

  .compare-card {
    flex: 1;
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
  }

  .compare-card.bad {
    background: #FFF5F5;
    border: 2px solid #FEB2B2;
  }

  .compare-card.good {
    background: #F5F0FF;
    border: 2px solid #7C3AED;
  }

  .compare-card .card-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 12px;
  }

  .compare-card.bad .card-title { color: #E53E3E; }
  .compare-card.good .card-title { color: #7C3AED; }

  .compare-card .card-desc {
    font-size: 24px;
    color: #555;
    line-height: 1.5;
  }

  /* Stripe examples */
  .example-box {
    background: #FAFAFA;
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 28px;
  }

  .example-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .example-item:last-child {
    margin-bottom: 0;
  }

  .example-dot {
    width: 10px;
    height: 10px;
    background: #7C3AED;
    border-radius: 50%;
    margin-top: 10px;
    flex-shrink: 0;
  }

  .example-text {
    font-size: 26px;
    color: #333;
    line-height: 1.5;
  }

  .example-text .purple {
    color: #7C3AED;
    font-weight: 700;
  }

  .divider {
    height: 1px;
    background: #EBEBEB;
    margin: 24px 0;
  }

  /* Reference check */
  .ref-box {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .ref-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 16px;
  }

  .ref-scale {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .scale-item {
    flex: 1;
    border-radius: 10px;
    padding: 14px 0;
    text-align: center;
    font-weight: 700;
    font-size: 26px;
  }

  .scale-1 {
    background: #7C3AED;
    color: #fff;
  }

  .scale-5 {
    background: #C4B5FD;
    color: #1A1A1A;
  }

  .scale-10 {
    background: #EDE9FE;
    color: #1A1A1A;
  }

  .ref-note {
    font-size: 24px;
    color: #555;
    line-height: 1.5;
    text-align: center;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 11</div>

    <h1 class="title">像价值投资者一样找人</h1>

    <div class="section-label">传统招聘 vs 价值投资招聘</div>

    <div class="compare-box">
      <div class="compare-card bad">
        <div class="card-title">传统招聘</div>
        <div class="card-desc">看名校背景<br>看大厂经历<br>看简历光鲜度</div>
      </div>
      <div class="compare-card good">
        <div class="card-title">价值投资</div>
        <div class="card-desc">找被低估的人<br>看潜力和特质<br>看真实作品</div>
      </div>
    </div>

    <div class="example-box">
      <div class="example-item">
        <div class="example-dot"></div>
        <div class="example-text">Stripe第一个设计师：<span class="purple">18岁，在瑞典</span></div>
      </div>
      <div class="example-item">
        <div class="example-dot"></div>
        <div class="example-text">Stripe CTO：<span class="purple">还在读大学</span></div>
      </div>
      <div class="example-item">
        <div class="example-dot"></div>
        <div class="example-text">先搞清"世界级"长什么样，再开始面试</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section-label">REFERENCE CHECK 量化技巧</div>

    <div class="ref-box">
      <div class="ref-title">直接问：这个人是你见过的...</div>
      <div class="ref-scale">
        <div class="scale-item scale-1">Top 1%</div>
        <div class="scale-item scale-5">Top 5%</div>
        <div class="scale-item scale-10">Top 10%</div>
      </div>
      <div class="ref-note">量化打分 >> "这人不错"</div>
    </div>
  </div>

  <div class="page-number">4 / 7</div>
</body>
</html>
