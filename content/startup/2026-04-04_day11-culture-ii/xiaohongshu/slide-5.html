<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #7C3AED;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 24px;
    color: #7C3AED;
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  /* Transparency section */
  .trans-box {
    background: #F5F0FF;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .trans-item {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 18px;
  }

  .trans-item:last-child {
    margin-bottom: 0;
  }

  .trans-icon {
    width: 44px;
    height: 44px;
    background: #7C3AED;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .trans-content {
    flex: 1;
  }

  .trans-title {
    font-size: 28px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 4px;
  }

  .trans-desc {
    font-size: 23px;
    color: #666;
    line-height: 1.4;
  }

  .crash-note {
    background: #FFF5F5;
    border: 2px solid #FEB2B2;
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    margin-bottom: 28px;
  }

  .crash-note p {
    font-size: 26px;
    color: #E53E3E;
    font-weight: 700;
  }

  .divider {
    height: 1px;
    background: #EBEBEB;
    margin: 20px 0;
  }

  /* Time horizon */
  .time-box {
    margin-bottom: 20px;
  }

  .time-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }

  .time-label {
    font-size: 26px;
    font-weight: 700;
    color: #1A1A1A;
    min-width: 130px;
  }

  .time-arrow {
    font-size: 28px;
    color: #CCC;
  }

  .time-horizon {
    font-size: 26px;
    font-weight: 700;
    color: #7C3AED;
  }

  .time-bar-container {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .time-bar {
    height: 20px;
    background: #7C3AED;
    border-radius: 10px;
  }

  /* SVG vertical text */
  .y-axis-label {
    position: absolute;
    left: 70px;
    bottom: 200px;
  }

  .bottom-note {
    background: #F5F0FF;
    border-left: 4px solid #7C3AED;
    padding: 18px 22px;
    margin-top: auto;
    margin-bottom: 60px;
  }

  .bottom-note p {
    font-size: 26px;
    color: #555;
    line-height: 1.5;
  }

  .bottom-note .purple {
    color: #7C3AED;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">6点起床学创业 Day 11</div>

    <h1 class="title">Stripe的极致透明 + 时间视野</h1>

    <div class="section-label">透明度是Stripe的核心文化</div>

    <div class="trans-box">
      <div class="trans-item">
        <div class="trans-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="white" stroke-width="2"/><path d="M3 7L12 13L21 7" stroke="white" stroke-width="2"/></svg>
        </div>
        <div class="trans-content">
          <div class="trans-title">邮件默认 bcc 全员</div>
          <div class="trans-desc">每封内部邮件自动抄送所有人</div>
        </div>
      </div>
      <div class="trans-item">
        <div class="trans-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 4H20V20H4V4Z" stroke="white" stroke-width="2"/><path d="M8 8H16M8 12H16M8 16H12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="trans-content">
          <div class="trans-title">Hackpad 文档全部公开</div>
          <div class="trans-desc">任何人可看任何项目进展</div>
        </div>
      </div>
    </div>

    <div class="crash-note">
      <p>170人时 Gmail 都崩了</p>
    </div>

    <div class="divider"></div>

    <div class="section-label">时间视野随公司年龄成比例增长</div>

    <div class="time-box">
      <div class="time-row">
        <div class="time-label">第 1 个月</div>
        <div class="time-bar-container">
          <div class="time-bar" style="width: 60px;"></div>
        </div>
        <div class="time-horizon">想 1 个月</div>
      </div>
      <div class="time-row">
        <div class="time-label">第 1 年</div>
        <div class="time-bar-container">
          <div class="time-bar" style="width: 180px;"></div>
        </div>
        <div class="time-horizon">想 1 年</div>
      </div>
      <div class="time-row">
        <div class="time-label">第 4 年</div>
        <div class="time-bar-container">
          <div class="time-bar" style="width: 400px;"></div>
        </div>
        <div class="time-horizon">想 4 年</div>
      </div>
    </div>

    <div class="bottom-note">
      <p><span class="purple">公司 = 很多小创业公司</span><br>自治团队 + 锚定项目 + 清除障碍</p>
    </div>
  </div>

  <div class="page-number">5 / 7</div>
</body>
</html>
