<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    position: relative;
  }

  .container {
    padding: 120px 100px;
    max-width: 920px;
  }

  .body-text {
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .highlight {
    color: #2EABB0;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 100px;
    font-size: 28px;
    font-weight: 400;
    color: rgba(26,26,26,0.3);
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <p class="body-text">"如果你已经很有钱了，你会做什么？"</p>
    <p class="body-text">导师问我这个问题的时候，我脱口而出："创办一家成功的公司。"</p>
    <p class="body-text">说完自己都愣住了。</p>
    <p class="body-text">有钱了还要"成功的公司"？<span class="highlight">这算什么答案？</span></p>
    <p class="body-text">三年前我还是个目标特别清晰的工程师。现在MBA快读完了，反而不知道自己要什么了。</p>
  </div>
  <div class="page-number">2 / 7</div>
</body>
</html>
