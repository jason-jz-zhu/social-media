<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    position: relative;
  }

  .container {
    padding: 120px 100px;
    max-width: 920px;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .body-text {
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .highlight {
    color: #2EABB0;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 100px;
    font-size: 28px;
    font-weight: 400;
    color: rgba(26,26,26,0.3);
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <h2 class="section-title">为什么去读MBA</h2>
    <p class="body-text">工程师出身，技术不差，但每次开会就说不出话。</p>
    <p class="body-text">想转管理方向，觉得自己缺沟通和领导力。</p>
    <p class="body-text">于是去了<span class="highlight">NYU Stern</span>。</p>
    <p class="body-text">周围坐的全是做sales、consulting、banking的人，思维方式跟工程师完全不一样。</p>
  </div>
  <div class="page-number">3 / 7</div>
</body>
</html>
