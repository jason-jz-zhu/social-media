<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 120px 100px;
    max-width: 920px;
    text-align: left;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .content p {
    margin-bottom: 28px;
  }

  .highlight {
    color: #2EABB0;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="section-title">副作用</div>
    <div class="content">
      <p>机会太多了以后，我什么都想试。</p>
      <p>做管理、做技术、搞副业、教课、写内容……每件事都沾一点，<span class="highlight">每件事都是半吊子</span>。</p>
      <p>MBA教会我追求每一个机会，但没教我该放弃哪些。</p>
      <p>"什么都想做"<span class="highlight">本身就是一种迷茫</span>，只是看起来很忙而已。</p>
    </div>
  </div>
  <div class="page-number">5 / 7</div>
</body>
</html>
