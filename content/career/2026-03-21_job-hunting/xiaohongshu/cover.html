<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: linear-gradient(160deg, #1A2A2B 0%, #0D3B3E 40%, #1A4A4E 100%);
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 10;
  }

  /* Glow shapes */
  .glow-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    top: -100px;
    right: -150px;
    background: radial-gradient(circle, rgba(46,171,176,0.15) 0%, transparent 70%);
    filter: blur(100px);
    pointer-events: none;
  }

  .glow-2 {
    position: absolute;
    width: 500px;
    height: 500px;
    bottom: 100px;
    left: -100px;
    background: radial-gradient(circle, rgba(46,171,176,0.15) 0%, transparent 70%);
    filter: blur(100px);
    pointer-events: none;
  }

  /* Doodle: resume icon top-left */
  .doodle-resume {
    position: absolute;
    top: 80px;
    left: 80px;
    opacity: 0.7;
  }

  /* Doodle: X mark top-right */
  .doodle-x {
    position: absolute;
    top: 90px;
    right: 100px;
    opacity: 0.7;
  }

  .content {
    position: absolute;
    top: 50%;
    left: 100px;
    transform: translateY(-50%);
    z-index: 5;
  }

  .title {
    font-size: 100px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.2;
    margin-bottom: 48px;
  }

  .keyword {
    color: #2EABB0;
    position: relative;
    display: inline-block;
  }

  .keyword::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: -6px;
    width: calc(100% + 12px);
    height: 40%;
    background: rgba(46,171,176,0.3);
    border-radius: 4px;
    z-index: -1;
  }

  .subtitle {
    font-size: 48px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Resume/document doodle -->
  <svg class="doodle-resume" width="70" height="90" viewBox="0 0 70 90" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="56" height="76" rx="4" stroke="white" stroke-width="3"/>
    <line x1="14" y1="22" x2="46" y2="22" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="36" x2="46" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="50" x2="36" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Folded corner -->
    <path d="M42 2 L58 2 L58 18" stroke="white" stroke-width="3" fill="none"/>
  </svg>

  <!-- X mark doodle -->
  <svg class="doodle-x" width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="8" y1="8" x2="52" y2="52" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="52" y1="8" x2="8" y2="52" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </svg>

  <div class="content">
    <div class="title">
      去年找了10个月工作<br>
      <span class="keyword">refer</span>真的没用了吗？
    </div>
    <div class="subtitle">10个月，无数简历，3个offer</div>
  </div>
</body>
</html>
