<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    position: relative;
  }

  .container {
    padding: 120px 100px;
    max-width: 920px;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .body-text {
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .highlight {
    color: #2EABB0;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCCCCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="section-title">Refer不像以前那么管用了</div>

    <p class="body-text">我在之前的公司亲眼看到，一个职位能收到上百份简历。</p>
    <p class="body-text">很多单纯网页版的refer，直接被淹没在系统里，<span class="highlight">连招聘经理都看不到</span>。</p>
    <p class="body-text">与其等别人帮你递简历，不如自己主动出击。</p>
  </div>

  <div class="page-number">3 / 7</div>
</body>
</html>
