<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left;
    padding: 120px 100px;
    max-width: 920px;
    height: 100%;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 48px;
  }

  .body-text {
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
  }

  .body-text p {
    margin-bottom: 36px;
  }

  .body-text p:last-child {
    margin-bottom: 0;
  }

  .highlight {
    color: #2EABB0;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="section-title">多投，别放弃</div>
    <div class="body-text">
      <p>投了没回应也别灰心。能多投就多投，只要没有明确拒绝你，就还有机会。</p>
      <p>我最后拿到的offer之一，就是之前投了没消息，过了一段时间他们又把我的简历翻出来联系我的。</p>
      <p><span class="highlight">没有回应 ≠ 被拒绝。</span></p>
    </div>
  </div>
  <div class="page-number">5 / 7</div>
</body>
</html>
