<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 120px 100px;
    max-width: 920px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 44px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 32px;
    margin-bottom: 48px;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .step-number {
    width: 44px;
    height: 44px;
    background: rgba(46, 171, 176, 0.12);
    color: #2EABB0;
    font-weight: 700;
    font-size: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-text {
    font-size: 38px;
    color: #333;
    line-height: 1.7;
  }

  .result-box {
    background: rgba(46, 171, 176, 0.05);
    border-left: 4px solid rgba(46, 171, 176, 0.3);
    border-radius: 12px;
    padding: 24px 28px;
    font-size: 34px;
    color: #888;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="section-title">没有PhD怎么做到的？</div>
    <div class="steps">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-text">在行业里积累真实经验</div>
      </div>
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-text">多去大学做分享、行业活动做演讲，建立口碑</div>
      </div>
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-text">通过朋友/校友/行业圈子建立连接</div>
      </div>
      <div class="step">
        <div class="step-number">4</div>
        <div class="step-text">找有硕士课程需求的学校</div>
      </div>
      <div class="step">
        <div class="step-number">5</div>
        <div class="step-text">用行业案例设计课程内容</div>
      </div>
    </div>
    <div class="result-box">关键：学校要的不是你的论文，是你的真实经验</div>
  </div>
  <div class="page-number">6 / 7</div>
</body>
</html>
