  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;

.content {
  display: flex;
  flex-direction: column;
  justify-content: center;

  font-size: 42px;

  color: #2EABB0;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 60px;

<body>

<div class="content">
  <p class="body-text">第一次走进教室的时候，我站在讲台上，底下坐着一排硕士生。有人叫了一声"Professor"。</p>
  <p class="body-text">那一刻挺恍惚的——<span class="highlight">我连博士都没读过。</span></p>
  <p class="body-text">说起来这个机会也挺偶然的。朋友在一所大学教CS相关的课，知道我有行业经验，就问我有没有兴趣来做客座讲师。</p>
  <p class="body-text">我想了想，试试呗。</p>
</div>
