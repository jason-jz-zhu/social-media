<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 120px 100px;
    max-width: 920px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 44px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .item {
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
    margin-bottom: 40px;
  }

  .item:last-child {
    margin-bottom: 0;
  }

  .highlight {
    color: #2EABB0;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="section-title">4个真实收获</div>
    <p class="item">认识了一帮有意思的人——教授、行业里来的人、还有一群特别聪明的学生。<span class="highlight">这个圈子是花钱买不到的。</span></p>
    <p class="item">简历上多了一行"大学讲师"，跟人聊天的时候提一句，<span class="highlight">多了一个让人信任的标签</span>。</p>
    <p class="item">教别人的过程中，自己想清楚了很多以前模模糊糊的东西。你以为你懂的，站在讲台上才发现不一定真懂。</p>
    <p class="item">而且说实话，<span class="highlight">站在那里分享自己知道的东西，本身就很爽</span>。</p>
  </div>
  <div class="page-number">5 / 7</div>
</body>
</html>
