<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FFFFFF;
  position: relative;
}

.content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 120px 100px;
  height: 100%;
  max-width: 920px;
}

.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 40px;
}

.body-text {
  font-size: 42px;
  font-weight: 400;
  color: #1A1A1A;
  line-height: 1.8;
  margin-bottom: 40px;
}

.body-text:last-of-type {
  margin-bottom: 0;
}

.highlight {
  color: #2EABB0;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>

<div class="content">
  <h2 class="section-title">钱不多，但收获远超</h2>
  <p class="body-text">说实话，一学期几千美金，算下来时薪可能还不如正常上班。</p>
  <p class="body-text">但教了一学期下来，我发现<span class="highlight">收获远超这个数</span>。</p>
</div>

<div class="page-number">4 / 7</div>

</body>
</html>
