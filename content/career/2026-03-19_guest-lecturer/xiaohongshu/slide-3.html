<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FFFFFF;
  position: relative;
}

.content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 120px 100px;
  height: 100%;
  max-width: 920px;
}

.body-text {
  font-size: 42px;
  font-weight: 400;
  color: #1A1A1A;
  line-height: 1.8;
  margin-bottom: 40px;
}

.body-text:last-of-type {
  margin-bottom: 0;
}

.highlight {
  color: #2EABB0;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>

<div class="content">
  <p class="body-text">很多人以为在美国大学教课一定要PhD，<span class="highlight">其实不一定</span>。</p>
  <p class="body-text">很多学校的硕士课程，更看重你在行业里真正做过什么。</p>
  <p class="body-text">你在大厂写过几年代码、带过团队、做过产品，这些经验对学生来说比论文更有用。</p>
  <p class="body-text"><span class="highlight">学校要的不是你的学位，是你的真实经验。</span></p>
</div>

<div class="page-number">3 / 7</div>

</body>
