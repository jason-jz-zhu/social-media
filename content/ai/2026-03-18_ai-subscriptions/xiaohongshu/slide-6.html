<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background: #FFFFFF; position: relative; display: flex; align-items: center; }
  .content { padding: 100px; max-width: 920px; }
  .section-title { font-family: 'Noto Serif SC', serif; font-size: 44px; font-weight: 700; color: #1A1A1A; margin-bottom: 40px; }
  .row { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; }
  .tool-tag { background: rgba(255,107,107,0.1); padding: 10px 22px; border-radius: 12px; font-size: 34px; font-weight: 700; color: #FF6B6B; white-space: nowrap; }
  .arrow { font-size: 30px; color: #CCC; }
  .usage { font-size: 36px; color: #333; }
  .summary-box { background: rgba(255,107,107,0.05); border-left: 4px solid rgba(255,107,107,0.3); border-radius: 12px; padding: 24px 28px; margin-top: 40px; }
  .summary-total { font-size: 44px; font-weight: 700; color: #FF6B6B; margin-bottom: 8px; }
  .summary-detail { font-size: 30px; color: #888; margin-bottom: 12px; }
  .summary-tip { font-size: 34px; color: #555; }
  .page-number { position: absolute; bottom: 60px; right: 80px; font-size: 28px; color: #CCC; }
</style>
</head>
<body>
  <div class="content">
    <p class="section-title">我的AI分工表</p>
    <div class="row">
      <span class="tool-tag">ChatGPT</span>
      <span class="arrow">→</span>
      <span class="usage">日常问答，第一反应</span>
    </div>
    <div class="row">
      <span class="tool-tag">Claude</span>
      <span class="arrow">→</span>
      <span class="usage">深度分析，审核ChatGPT</span>
    </div>
    <div class="row">
      <span class="tool-tag">Genspark</span>
      <span class="arrow">→</span>
      <span class="usage">做PPT，开会救命</span>
    </div>
    <div class="summary-box">
      <p class="summary-detail">ChatGPT $200 · Claude $200 · Genspark $50</p>
      <p class="summary-total">总计 $450/月</p>
      <p class="summary-tip">核心技巧：让两个AI互相审核</p>
    </div>
  </div>
  <div class="page-number">6 / 7</div>
</body>
</html>
