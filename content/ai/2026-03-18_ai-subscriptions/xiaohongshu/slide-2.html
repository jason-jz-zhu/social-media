<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background: #FFFFFF; position: relative; display: flex; align-items: center; }
  .content { padding: 120px 100px; max-width: 920px; }
  .body-text { font-size: 42px; font-weight: 400; color: #1A1A1A; line-height: 1.8; margin-bottom: 40px; }
  .highlight { color: #FF6B6B; font-weight: 700; }
  .page-number { position: absolute; bottom: 60px; right: 80px; font-size: 28px; color: #CCC; }
</style>
</head>
<body>
  <div class="content">
    <p class="body-text">上个月信用卡账单出来，老婆看到一笔<span class="highlight">450美金</span>的订阅费。</p>
    <p class="body-text">"这是什么？"<br>"AI工具。"<br>"你每个月花3000多人民币让机器人帮你干活？"</p>
    <p class="body-text">我一开始想解释，但发现很难用一句话说清楚。</p>
    <p class="body-text">后来我算了一笔账给她看。</p>
    <p class="body-text"><span class="highlight">她没再说什么。</span></p>
  </div>
  <div class="page-number">2 / 7</div>
</body>
</html>
