<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; background: #FFFFFF; position: relative; display: flex; align-items: center; }
  .content { padding: 100px; max-width: 920px; }
  .section-title { font-family: 'Noto Serif SC', serif; font-size: 48px; font-weight: 700; color: #1A1A1A; margin-bottom: 40px; }
  .body-text { font-size: 42px; font-weight: 400; color: #1A1A1A; line-height: 1.8; margin-bottom: 36px; }
  .highlight { color: #FF6B6B; font-weight: 700; }
  .tip-box { background: rgba(255,107,107,0.06); border-left: 4px solid rgba(255,107,107,0.3); border-radius: 12px; padding: 24px 28px; margin-top: 20px; }
  .tip-text { font-size: 38px; color: #555; line-height: 1.7; }
  .page-number { position: absolute; bottom: 60px; right: 80px; font-size: 28px; color: #CCC; }
</style>
</head>
<body>
  <div class="content">
    <p class="section-title">核心用法：让两个AI互相审核</p>
    <p class="body-text">我有个习惯——让Claude去审核ChatGPT给的结果，反过来也会让ChatGPT检查Claude的回答。</p>
    <p class="body-text">两个AI互相查，比只信一个<span class="highlight">靠谱得多</span>。</p>
    <p class="body-text">写方案的时候尤其有用。一个出初稿，另一个挑毛病，来回两轮质量就上去了。</p>
    <div class="tip-box">
      <p class="tip-text">很多人只用一个AI，其实让它们互相审核，效果完全不一样。</p>
    </div>
  </div>
  <div class="page-number">4 / 7</div>
</body>
</html>
