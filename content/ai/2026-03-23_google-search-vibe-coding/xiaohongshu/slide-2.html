<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    background: #FFFFFF;
    position: relative;
    display: flex;
    align-items: center;
  }

  .content {
    padding: 120px 100px;
    max-width: 920px;
  }

  .body-text {
    font-size: 42px;
    font-weight: 400;
    color: #1A1A1A;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .body-text:last-of-type {
    margin-bottom: 0;
  }

  .highlight {
    color: #FF6B6B;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCCCCC;
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="content">
  <p class="body-text">二十年前Google搜索刚出来的时候，大家觉得这只是个"查东西的工具"。</p>
  <p class="body-text">没人想到它会干掉旅行社、干掉百科全书、干掉黄页。</p>
  <p class="body-text">现在AI出来了，很多人也觉得这只是个"聊天的工具"。</p>
  <p class="body-text"><span class="highlight">历史总是惊人地相似。</span></p>
</div>

<div class="page-number">2 / 7</div>

</body>
</html>
