<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 42px;
  font-weight: 400;
  color: #1A1A1A;
  line-height: 1.8;
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
}

.container {
  padding: 120px 100px;
  max-width: 920px;
  text-align: left;
}

.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 36px;
}

.content p {
  margin-bottom: 28px;
}

.highlight {
  color: #FF6B6B;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
}
</style>
</head>
<body>
<div class="container">
  <div class="section-title">底层逻辑一样</div>
  <div class="content">
    <p>Google时代：<span class="highlight">会搜索的人</span>和不会搜索的人，获取信息的效率差了十倍。</p>
    <p>AI时代：<span class="highlight">会用的人</span>和不会用的人，产出差距只会更大。</p>
    <p>工具人人都有，差别在于你怎么用。</p>
    <p>同样的AI，有人让它写周报，有人让它搭一个产品。</p>
  </div>
</div>
<div class="page-number">5 / 7</div>
</body>
</html>
