  .content {
    padding: 120px 100px;
    max-width: 920px;
  }

  .section-title {
    font-family: 'Noto Serif SC', serif;

    font-weight: 700;

  .body-text {
    font-size: 42px;

    margin-bottom: 0;

    color: #FF6B6B;

<div class="content">
  <h2 class="section-title">Google当年干掉了谁？</h2>
  <p class="body-text">旅行社慌了。百科全书停刊了（大英百科印了244年）。黄页没人翻了。</p>
  <p class="body-text">一堆行业消失了——但做技术的人不慌。</p>
  <p class="body-text">因为我们觉得自己是拿刀的人，不是案板上的鱼。</p>
  <p class="body-text">而且Google<span class="highlight">催生了无数新职业</span>——SEO、数字营销、电商运营，这些岗位以前根本不存在。</p>
</div>
