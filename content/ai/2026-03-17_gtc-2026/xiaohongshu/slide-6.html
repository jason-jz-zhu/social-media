<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFF9F5;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .grain {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .bg-shape-1 {
    position: absolute;
    width: 600px; height: 600px;
    top: -100px; right: -150px;
    background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
    filter: blur(120px);
    border-radius: 50%;
  }

  .bg-shape-2 {
    position: absolute;
    width: 500px; height: 500px;
    bottom: -50px; left: -100px;
    background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%);
    filter: blur(120px);
    border-radius: 50%;
  }

  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    height: 100%;
    padding: 100px;
    gap: 48px;
  }

  .label-pill {
    background: #FF6B6B;
    color: #fff;
    font-size: 32px;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 20px;
    display: inline-block;
  }

  .point-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 700;
    color: #1A1A1A;
  }

  .body-text {
    font-size: 42px;
    font-weight: 400;
    color: #333;
    line-height: 1.75;
  }

  .highlight {
    color: #FF6B6B;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 50px;
    right: 60px;
    font-size: 28px;
    color: #BBB;
    letter-spacing: 2px;
    z-index: 10;
  }
</style>
</head>
<body>

<svg class="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.03"/>
</svg>

<div class="bg-shape-1"></div>
<div class="bg-shape-2"></div>

<div class="content">
  <div class="label-pill">彩蛋</div>
  <div class="point-title">迪士尼把雪宝做成真的了</div>
  <div class="body-text">
    一个能自己走路、自主互动的<br>Olaf机器人在现场亮相<br><br>
    <span class="highlight">全场尖叫</span><br><br>
    3月29号<br>巴黎迪士尼乐园正式登场<br><br>
    <span class="highlight">AI开始从屏幕走进现实了</span>
  </div>
</div>

<div class="page-number">6 / 8</div>

</body>
</html>
