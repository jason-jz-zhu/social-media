<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; position: relative; background: #FFF9F5; }
  .bg-shape { position: absolute; border-radius: 50%; filter: blur(120px); }
  .bg-shape-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%); top: -80px; right: -60px; }
  .bg-shape-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%); bottom: -60px; left: -60px; }
  .grain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 256px 256px; }
  .content {
    position: relative; z-index: 10; display: flex; flex-direction: column; gap: 40px;
    max-width: 880px; height: 100%; justify-content: center; padding: 100px;
    margin: 0 auto;
  }
  .label { display: inline-block; background: #FF6B6B; color: #FFF; font-size: 32px; font-weight: 700; padding: 10px 28px; border-radius: 20px; letter-spacing: 2px; align-self: flex-start; }
  .point-title { font-family: 'Noto Serif SC', serif; font-size: 48px; font-weight: 700; color: #1A1A1A; }
  .step-box { display: flex; align-items: flex-start; gap: 20px; }
  .step-num {
    flex-shrink: 0; width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,107,107,0.12); color: #FF6B6B;
    font-size: 28px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    margin-top: 6px;
  }
  .step-text { font-size: 40px; font-weight: 400; color: #333; line-height: 1.7; }
  .tool-note {
    font-size: 34px; color: #888; line-height: 1.6;
    padding: 20px 28px;
    background: rgba(255,107,107,0.05);
    border-radius: 16px;
    border-left: 4px solid rgba(255,107,107,0.3);
  }
  .page-num { position: absolute; bottom: 50px; right: 60px; font-size: 28px; color: #BBB; letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="grain"></div>
  <div class="content">
    <span class="label">我的流程</span>
    <p class="point-title">从想法到初版，三步</p>
    <div class="step-box">
      <div class="step-num">1</div>
      <p class="step-text">用大白话把想做的东西<br>描述清楚</p>
    </div>
    <div class="step-box">
      <div class="step-num">2</div>
      <p class="step-text">让AI出第一版代码<br>跑起来看看效果</p>
    </div>
    <div class="step-box">
      <div class="step-num">3</div>
      <p class="step-text">哪里不对就继续描述<br>来回几轮就差不多了</p>
    </div>
    <div class="tool-note">
      ChatGPT / Claude 理清想法<br>Claude Code (Opus) 规划 → 执行<br>多个AI并行干活，不用写一行代码
    </div>
  </div>
  <div class="page-num">7 / 8</div>
</body>
</html>
