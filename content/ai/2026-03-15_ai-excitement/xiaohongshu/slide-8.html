<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; position: relative; background: #FFF9F5; }
  .bg-shape { position: absolute; border-radius: 50%; filter: blur(120px); }
  .bg-shape-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .grain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 256px 256px; }
  .content {
    position: relative; z-index: 10; display: flex; flex-direction: column; gap: 44px;
    align-items: center; text-align: center; max-width: 880px;
    height: 100%; justify-content: center; padding: 100px;
    margin: 0 auto;
  }
  .golden { font-family: 'Noto Serif SC', serif; font-size: 48px; font-weight: 900; color: #1A1A1A; line-height: 1.5; letter-spacing: 2px; }
  .golden .highlight { color: #FF6B6B; font-weight: 900; }
  .divider { display: flex; align-items: center; gap: 16px; width: 300px; }
  .divider-line { flex: 1; height: 1.5px; background: linear-gradient(90deg, transparent, rgba(26,26,26,0.15), transparent); }
  .divider-dot { width: 8px; height: 8px; border-radius: 50%; background: #FF6B6B; opacity: 0.5; }
  .cta-text { font-size: 40px; font-weight: 500; color: #555; line-height: 1.5; letter-spacing: 2px; }
  .tags { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .tag { padding: 10px 28px; border-radius: 24px; font-size: 28px; font-weight: 500; letter-spacing: 2px; color: #888; background: rgba(255,107,107,0.06); border: 1px solid rgba(255,107,107,0.12); }
  .page-num { position: absolute; bottom: 50px; right: 60px; font-size: 28px; color: #BBB; letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="grain"></div>
  <div class="content">
    <p class="golden">
      你需要的只是<br>
      <span class="highlight">一个周末</span><br>
      和一个足够让你<br>
      <span class="highlight">睡不着的念头</span>
    </p>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
    <p class="cta-text">如果你也有一个<br>一直想做的想法<br>现在真的可以试试</p>
    <div class="tags">
      <span class="tag">#AI创业</span>
      <span class="tag">#独立开发</span>
      <span class="tag">#一个周末做产品</span>
      <span class="tag">#从小做起</span>
    </div>
  </div>
  <div class="page-num">8 / 8</div>
</body>
</html>
