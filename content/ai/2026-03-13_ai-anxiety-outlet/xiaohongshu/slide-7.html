<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; }
  .card {
    width: 1080px; height: 1440px; position: relative; background: #FFF9F5;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px;
  }
  .bg-shape { position: absolute; border-radius: 50%; filter: blur(120px); }
  .bg-shape-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(46,171,176,0.08) 0%, transparent 70%); top: -80px; right: -60px; }
  .bg-shape-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(46,171,176,0.06) 0%, transparent 70%); bottom: -60px; left: -60px; }
  .grain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 256px 256px; }
  .content {
    position: relative; z-index: 10; display: flex; flex-direction: column; gap: 44px;
    max-width: 880px; text-align: center; align-items: center;
  }
  .golden {
    font-family: 'Noto Serif SC', serif; font-size: 52px; font-weight: 900;
    color: #1A1A1A; line-height: 1.5; letter-spacing: 2px;
  }
  .golden .highlight { color: #2EABB0; font-weight: 900; }
  .divider { display: flex; align-items: center; gap: 16px; width: 300px; }
  .divider-line { flex: 1; height: 1.5px; background: linear-gradient(90deg, transparent, rgba(26,26,26,0.15), transparent); }
  .divider-dot { width: 8px; height: 8px; border-radius: 50%; background: #2EABB0; opacity: 0.5; }
  .body-text { font-size: 44px; font-weight: 500; color: #333; line-height: 1.6; letter-spacing: 2px; text-align: center; }
  .body-text .highlight { color: #2EABB0; font-weight: 700; }
  .page-num { position: absolute; bottom: 50px; right: 60px; font-size: 28px; color: #BBB; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="grain"></div>
  <div class="content">
    <p class="golden">
      AI是工具<br>用好它就行
    </p>
    <p class="golden">
      但人的思考、感受和表达<br>才是真正<span class="highlight">属于我们自己</span>的东西
    </p>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
    <p class="body-text">
      与其焦虑，不如<span class="highlight">开口</span><br>
      与其囤积，不如<span class="highlight">分享</span>
    </p>
  </div>
  <div class="page-num">7 / 8</div>
</div>
</body>
</html>
