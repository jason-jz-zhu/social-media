<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; }
  .card {
    width: 1080px; height: 1440px; position: relative;
    background: #FFF9F5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 100px;
  }
  .bg-shape { position: absolute; border-radius: 50%; filter: blur(120px); }
  .bg-shape-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(46,171,176,0.08) 0%, transparent 70%); top: -60px; right: -80px; }
  .bg-shape-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(46,171,176,0.05) 0%, transparent 70%); bottom: -40px; left: -60px; }
  .grain {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.03; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  .content {
    position: relative; z-index: 10; text-align: center; padding: 0 80px;
    display: flex; flex-direction: column; align-items: center; gap: 40px;
  }
  .top-icon svg { width: 100px; height: 100px; }
  .headline {
    font-family: 'Noto Serif SC', serif; font-size: 96px; font-weight: 900;
    line-height: 1.3; color: #1A1A1A; letter-spacing: 4px;
  }
  .headline .accent { color: #2EABB0; position: relative; display: inline-block; }
  .headline .accent::after {
    content: ''; position: absolute; bottom: 4px; left: -4px;
    width: calc(100% + 8px); height: 14px;
    background: rgba(46,171,176,0.15); border-radius: 7px; z-index: -1;
  }
  .divider { display: flex; align-items: center; gap: 16px; width: 360px; }
  .divider-line { flex: 1; height: 1.5px; background: linear-gradient(90deg, transparent, rgba(26,26,26,0.15), transparent); }
  .divider-dot { width: 8px; height: 8px; border-radius: 50%; background: #2EABB0; opacity: 0.5; }
  .subtitle {
    font-family: 'Noto Sans SC', sans-serif; font-size: 48px; font-weight: 500;
    color: #555; letter-spacing: 4px; line-height: 1.5;
  }
  .tags { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
  .tag {
    padding: 12px 32px; border-radius: 24px; font-size: 32px; font-weight: 500;
    letter-spacing: 2px; color: #666;
    background: rgba(46,171,176,0.08); border: 1px solid rgba(46,171,176,0.15);
  }
  .bottom-art { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); opacity: 0.4; }
  .bottom-art svg { width: 44px; height: 44px; }
</style>
</head>
<body>
<div class="card">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="grain"></div>
  <div class="content">
    <div class="top-icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="45" r="25" stroke="#1A1A1A" stroke-width="2" fill="none" opacity="0.2"/>
        <path d="M38 45 C38 45, 44 30, 50 30 C56 30, 62 45, 62 45" stroke="#2EABB0" stroke-width="2.5" fill="none" opacity="0.5"/>
        <path d="M42 45 C42 45, 46 35, 50 35 C54 35, 58 45, 58 45" stroke="#2EABB0" stroke-width="2" fill="none" opacity="0.35"/>
        <path d="M50 70 L50 58" stroke="#2EABB0" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
        <path d="M44 65 L50 58 L56 65" stroke="#2EABB0" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="headline">
      <span class="accent">AI时代</span>，<br>
      你的出口是什么？
    </h1>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
    <p class="subtitle">越是AI的时代<br>越需要真实的表达</p>
    <div class="tags">
      <span class="tag">#真实表达</span>
      <span class="tag">#AI焦虑</span>
      <span class="tag">#自我探索</span>
    </div>
  </div>
  <div class="bottom-art">
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="15" cy="22" r="10" stroke="#1A1A1A" stroke-width="1.5" fill="none" opacity="0.6"/>
      <circle cx="29" cy="22" r="10" stroke="#2EABB0" stroke-width="1.5" fill="none" opacity="0.6"/>
    </svg>
  </div>
</div>
</body>
</html>
