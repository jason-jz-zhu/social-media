<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px; overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .card {
    width: 1080px; height: 1440px; position: relative;
    background: #FFF9F5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px;
  }
  .bg-shape {
    position: absolute; border-radius: 50%; filter: blur(120px);
  }
  .bg-shape-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,107,53,0.06) 0%, transparent 70%);
    bottom: -60px; right: -40px;
  }
  .bg-shape-2 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(255,180,100,0.05) 0%, transparent 70%);
    top: -40px; left: -40px;
  }
  .grain {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.03; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  .content {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; gap: 48px;
    max-width: 880px;
  }
  .label {
    display: inline-block;
    background: #FF6B35;
    color: #FFFFFF;
    font-size: 32px; font-weight: 700;
    padding: 10px 28px;
    border-radius: 20px;
    letter-spacing: 2px;
    align-self: flex-start;
  }
  .body-text {
    font-size: 42px; font-weight: 400; color: #333;
    line-height: 1.75; letter-spacing: 1px;
  }
  .highlight {
    color: #FF6B35; font-weight: 700;
  }
  .page-num {
    position: absolute; bottom: 50px; right: 60px;
    font-size: 28px; color: #BBBBBB; font-weight: 400;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="grain"></div>
  <div class="content">
    <span class="label">原因三</span>
    <p class="body-text" style="font-family: 'Noto Serif SC', serif; font-size: 52px; font-weight: 700; color: #1A1A1A;">
      期望值高了
    </p>
    <p class="body-text">
      大家觉得你有AI加持<br>
      产出应该更多更快
    </p>
    <p class="body-text">
      deadline更紧，scope更大<br>
      <span class="highlight">但你还是一个脑子</span>
    </p>
  </div>
  <div class="page-num">5 / 8</div>
</div>
</body>
</html>
