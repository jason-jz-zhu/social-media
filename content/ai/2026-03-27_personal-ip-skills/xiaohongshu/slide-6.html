<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 6 - 收藏页</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #0EA5E9;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 46px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 44px;
  }

  .points-list {
    display: flex;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }

  .point-card {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    background: #F9FAFB;
    border-radius: 16px;
    padding: 28px 30px;
  }

  .point-icon {
    width: 52px;
    height: 52px;
    background: #0EA5E9;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .point-icon svg {
    width: 28px;
    height: 28px;
  }

  .point-content {
    flex: 1;
  }

  .point-title {
    font-size: 30px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 8px;
  }

  .point-desc {
    font-size: 25px;
    color: #777;
    line-height: 1.5;
  }

  .point-desc .teal {
    color: #0EA5E9;
    font-weight: 600;
  }

  .save-prompt {
    margin-top: 28px;
    text-align: center;
    font-size: 28px;
    color: #BBB;
    font-weight: 500;
    padding: 16px;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">核心要点</div>

    <h1 class="title">一张图记住：AI时代个人IP</h1>

    <div class="points-list">
      <div class="point-card">
        <div class="point-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="point-content">
          <div class="point-title">个人IP正在升维</div>
          <div class="point-desc">从"内容output"到"<span class="teal">内容+系统</span>"</div>
        </div>
      </div>

      <div class="point-card">
        <div class="point-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M12 18v-6M9 15l3 3 3-3"/></svg>
        </div>
        <div class="point-content">
          <div class="point-title">Infra vs Personal Skill</div>
          <div class="point-desc">通用工具无壁垒，<span class="teal">隐性知识外化</span>才是IP</div>
        </div>
      </div>

      <div class="point-card">
        <div class="point-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </div>
        <div class="point-content">
          <div class="point-title">菜谱可抄，味觉不能</div>
          <div class="point-desc">Personal skill不可fork，有<span class="teal">复利效应</span></div>
        </div>
      </div>

      <div class="point-card">
        <div class="point-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="point-content">
          <div class="point-title">系统比文章更值钱</div>
          <div class="point-desc">文章是output，系统是<span class="teal">生成output的机器</span></div>
        </div>
      </div>

      <div class="point-card">
        <div class="point-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="point-content">
          <div class="point-title">竞争力 = Skill Stack深度</div>
          <div class="point-desc">你的personal skill stack越深，<span class="teal">护城河越宽</span></div>
        </div>
      </div>
    </div>

    <div class="save-prompt">收藏备用，开始训练你的系统</div>
  </div>

  <div class="page-number">6 / 7</div>
</body>
</html>
