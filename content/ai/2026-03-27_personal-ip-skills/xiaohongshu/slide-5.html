<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 5 - 作者案例</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #0EA5E9;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 30px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 44px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 26px;
    color: #888;
    margin-bottom: 36px;
  }

  .timeline {
    position: relative;
    padding-left: 50px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 10px;
    bottom: 10px;
    width: 4px;
    background: linear-gradient(180deg, #0EA5E9, #06B6D4);
    border-radius: 2px;
  }

  .timeline-item {
    position: relative;
    background: #F9FAFB;
    border-radius: 14px;
    padding: 22px 26px;
  }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -42px;
    top: 26px;
    width: 16px;
    height: 16px;
    background: #0EA5E9;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 3px #0EA5E9;
  }

  .timeline-day {
    font-size: 20px;
    color: #0EA5E9;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .timeline-title {
    font-size: 28px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 6px;
  }

  .timeline-desc {
    font-size: 23px;
    color: #777;
    line-height: 1.5;
  }

  .timeline-desc .teal {
    color: #0EA5E9;
    font-weight: 600;
  }

  .result-box {
    margin-top: 24px;
    background: #1A1A1A;
    border-radius: 16px;
    padding: 28px 34px;
  }

  .result-title {
    font-size: 24px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
    letter-spacing: 2px;
  }

  .result-text {
    font-size: 30px;
    color: #fff;
    font-weight: 700;
    line-height: 1.6;
  }

  .result-text .teal {
    color: #0EA5E9;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">我的实践</div>

    <h1 class="title">20天YC系列的Skill进化</h1>
    <div class="subtitle">每条读者feedback = 一次系统升级</div>

    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-day">DAY 1-3</div>
        <div class="timeline-title">措辞优化</div>
        <div class="timeline-desc">读者说"今天学了什么"像学生笔记<br>系统编码：<span class="teal">用"今日拆解"替代</span></div>
      </div>

      <div class="timeline-item">
        <div class="timeline-day">DAY 5-8</div>
        <div class="timeline-title">视觉规范</div>
        <div class="timeline-desc">发现slide内容经常溢出1080x1440<br>系统编码：<span class="teal">自动溢出检查 + 字数上限</span></div>
      </div>

      <div class="timeline-item">
        <div class="timeline-day">DAY 10-14</div>
        <div class="timeline-title">设计系统</div>
        <div class="timeline-desc">配色不统一，品牌感弱<br>系统编码：<span class="teal">封面配色规范 + 暖色>冷色规则</span></div>
      </div>

      <div class="timeline-item">
        <div class="timeline-day">DAY 15-20</div>
        <div class="timeline-title">内容策略</div>
        <div class="timeline-desc">纯干货收藏低，故事型收藏高<br>系统编码：<span class="teal">故事优先 + 收藏页设计</span></div>
      </div>
    </div>

    <div class="result-box">
      <div class="result-title">RESULT</div>
      <div class="result-text">这不是文档，是<span class="teal">活的工作流</span><br>每次创作都比上一次更高效、更精准</div>
    </div>
  </div>

  <div class="page-number">5 / 7</div>
</body>
</html>
