<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 42px;
  font-weight: 400;
  color: #1A1A1A;
  line-height: 1.8;
  position: relative;
  overflow: hidden;
}

.container {
  padding: 120px 100px;
  max-width: 920px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}

.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 48px;
}

.compare-row {
  display: flex;
  align-items: center;
  gap: 28px;
  margin-bottom: 32px;
}

.label-coral {
  background: rgba(255,107,107,0.1);
  padding: 8px 20px;
  border-radius: 12px;
  font-size: 32px;
  font-weight: 700;
  color: #FF6B6B;
  white-space: nowrap;
}

.label-gray {
  background: #f0f0f0;
  padding: 8px 20px;
  border-radius: 12px;
  font-size: 32px;
  font-weight: 700;
  color: #888;
  white-space: nowrap;
}

.compare-text {
  font-size: 36px;
  color: #333;
}

.result-box {
  background: rgba(255,107,107,0.05);
  border-left: 4px solid rgba(255,107,107,0.3);
  border-radius: 12px;
  padding: 24px 28px;
  margin-top: 40px;
}

.result-line {
  font-size: 34px;
  color: #888;
  line-height: 2;
}

.result-line.bold {
  font-size: 34px;
  color: #555;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
}

.highlight { color: #FF6B6B; font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <div class="section-title">vs OpenClaw 怎么选？</div>

  <div class="compare-row">
    <div class="label-coral">Remote Control</div>
    <div class="compare-text">官方方案·零配置·更安全</div>
  </div>

  <div class="compare-row">
    <div class="label-gray">OpenClaw</div>
    <div class="compare-text">功能更多·需要部署·有安全隐患</div>
  </div>

  <div class="result-box">
    <div class="result-line">只想手机遥控Claude Code → Remote Control</div>
    <div class="result-line">想接入飞书/钉钉/多平台 → OpenClaw</div>
    <div class="result-line bold">怕折腾就用官方的，省心</div>
  </div>
</div>
<div class="page-number">7 / 8</div>
</body>
</html>
