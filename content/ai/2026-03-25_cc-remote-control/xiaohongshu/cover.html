<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Cover</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
}

.slide {
  width: 1080px;
  height: 1440px;
  background: linear-gradient(160deg, #FF6B35 0%, #FF8E53 40%, #FFC371 100%);
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 100px;
}

.glow1 {
  position: absolute;
  top: -80px;
  left: -60px;
  width: 500px;
  height: 500px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
}

.glow2 {
  position: absolute;
  bottom: 100px;
  right: -100px;
  width: 400px;
  height: 400px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
}

.grain {
  position: absolute;
  inset: 0;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none;
}

.icon-phone {
  position: absolute;
  top: 160px;
  left: 120px;
  opacity: 0.7;
}

.icon-laptop {
  position: absolute;
  top: 180px;
  right: 120px;
  opacity: 0.7;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.title {
  font-size: 96px;
  font-weight: 900;
  color: #FFFFFF;
  line-height: 1.2;
  margin-bottom: 48px;
}

.keyword {
  position: relative;
  z-index: 1;
}

.keyword::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: -6px;
  width: calc(100% + 12px);
  height: 40%;
  background: rgba(255,255,255,0.3);
  border-radius: 4px;
  z-index: -1;
}

.subtitle {
  font-size: 44px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="slide">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="grain"></div>

  <svg class="icon-phone" width="70" height="110" viewBox="0 0 70 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="66" height="106" rx="12" stroke="white" stroke-width="3.5"/>
    <circle cx="35" cy="94" r="5" stroke="white" stroke-width="3"/>
  </svg>

  <svg class="icon-laptop" width="100" height="80" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="12" y="2" width="76" height="52" rx="6" stroke="white" stroke-width="3.5"/>
    <path d="M2 58 L98 58 L92 74 L8 74 Z" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  </svg>

  <div class="content">
    <div class="title">
      Claude Code<br>
      手机遥控<span class="keyword">写代码</span>
    </div>
    <div class="subtitle">2分钟配好｜零代码基础也能看懂</div>
  </div>
</div>
</body>
</html>
