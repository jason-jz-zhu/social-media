<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 42px;
  font-weight: 400;
  color: #1A1A1A;
  line-height: 1.8;
  position: relative;
  overflow: hidden;
}

.container {
  padding: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
  text-align: center;
}

.quote {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 900;
  color: #1A1A1A;
  line-height: 1.5;
  text-align: center;
  margin-bottom: 32px;
}

.subtitle {
  font-size: 38px;
  color: #888;
  text-align: center;
  margin-bottom: 40px;
}

.divider {
  display: flex;
  align-items: center;
  width: 300px;
  margin: 0 auto 40px;
  gap: 0;
}

.divider-line {
  flex: 1;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(255,107,107,0.3));
}

.divider-line:last-child {
  background: linear-gradient(90deg, rgba(255,107,107,0.3), transparent);
}

.divider-dot {
  width: 8px;
  height: 8px;
  background: #FF6B6B;
  opacity: 0.5;
  border-radius: 50%;
  margin: 0 12px;
}

.cta {
  font-size: 38px;
  font-weight: 500;
  color: #555;
  text-align: center;
  margin-bottom: 48px;
  line-height: 1.8;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
}

.tag {
  font-size: 28px;
  font-weight: 500;
  color: #888;
  background: rgba(255,107,107,0.06);
  border: 1px solid rgba(255,107,107,0.12);
  padding: 10px 28px;
  border-radius: 24px;
}

.page-number {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
}

.highlight { color: #FF6B6B; font-weight: 900; }
</style>
</head>
<body>
<div class="container">
  <div class="quote">代码在电脑上跑<br>你在<span class="highlight">任何地方</span>遥控</div>

  <div class="subtitle">2分钟配好，改变你和代码的关系</div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="cta">试过的来说说体验？<br>没试过有问题可以评论区问我</div>

  <div class="tags">
    <span class="tag">#ClaudeCode</span>
    <span class="tag">#RemoteControl</span>
    <span class="tag">#AI写代码</span>
    <span class="tag">#效率工具</span>
  </div>
</div>
<div class="page-number">8 / 8</div>
</body>
</html>
