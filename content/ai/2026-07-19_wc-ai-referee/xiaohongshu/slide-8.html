  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; background: #FAF3E7; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; }

  .sub .hl { color: #FF6B6B; font-weight: 700; }
  .night { background: #FFF; border-radius: 14px; padding: 28px 36px; margin-bottom: 44px; box-shadow: 0 4px 18px rgba(30,42,58,0.06); }

  .night .g { color: #3E7A4E; font-weight: 700; }
  .tags { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-bottom: 40px; }
