<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 7 - 金句 + CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 100px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    text-align: center;
  }

  .quote-mark {
    font-size: 120px;
    color: #0EA5E9;
    opacity: 0.15;
    font-family: 'Noto Serif SC', serif;
    line-height: 0.6;
    margin-bottom: 30px;
  }

  .quote {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 900;
    color: #1A1A1A;
    line-height: 1.5;
    text-align: center;
    margin-bottom: 24px;
    max-width: 800px;
  }

  .highlight { color: #0EA5E9; font-weight: 900; }

  .sub-quote {
    font-size: 32px;
    color: #888;
    margin-bottom: 50px;
    line-height: 1.5;
  }

  .divider {
    display: flex;
    align-items: center;
    width: 300px;
    margin: 0 auto 50px;
  }

  .divider-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(14,165,233,0.3));
  }

  .divider-line:last-child {
    background: linear-gradient(90deg, rgba(14,165,233,0.3), transparent);
  }

  .divider-dot {
    width: 8px;
    height: 8px;
    background: #0EA5E9;
    opacity: 0.5;
    border-radius: 50%;
    margin: 0 12px;
  }

  .cta {
    font-size: 34px;
    font-weight: 500;
    color: #555;
    text-align: center;
    margin-bottom: 50px;
    line-height: 1.8;
  }

  .author-section {
    margin-bottom: 40px;
  }

  .author-name {
    font-size: 28px;
    font-weight: 700;
    color: #333;
    margin-bottom: 6px;
  }

  .author-desc {
    font-size: 22px;
    color: #999;
    line-height: 1.5;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
  }

  .tag {
    font-size: 26px;
    font-weight: 500;
    color: #0EA5E9;
    background: rgba(14,165,233,0.06);
    border: 1px solid rgba(14,165,233,0.15);
    padding: 10px 24px;
    border-radius: 24px;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="quote-mark">"</div>

    <div class="quote">写代码从<span class="highlight">坐班</span><br>变成了<span class="highlight">遥控</span></div>

    <div class="sub-quote">两分钟配好，从此coding不用守着电脑</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="cta">你们有没有在非传统场景写过代码？<br>地铁上、咖啡厅、甚至排队的时候？<br>评论区聊聊</div>

    <div class="author-section">
      <div class="author-name">朱佳臻 Jiazhen Zhu</div>
      <div class="author-desc">10年Data/AI | NYU Stern MBA | NEU客座讲师</div>
    </div>

    <div class="tags">
      <span class="tag">#ClaudeCode</span>
      <span class="tag">#RemoteControl</span>
      <span class="tag">#AI写代码</span>
      <span class="tag">#效率工具</span>
    </div>
  </div>

  <div class="page-number">7 / 7</div>
</body>
</html>
