<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFF9F5;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
}

.grain {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

.bg-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
}

.bg-shape-1 {
  width: 600px; height: 600px;
  top: -100px; right: -150px;
  background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
}

.bg-shape-2 {
  width: 500px; height: 500px;
  bottom: -80px; left: -100px;
  background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%);
}

.content {
  position: relative;
  z-index: 5;
  padding: 100px;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.label {
  display: inline-block;
  background: #FF6B6B;
  color: #fff;
  font-size: 32px;
  font-weight: 700;
  padding: 10px 28px;
  border-radius: 20px;
  align-self: flex-start;
}

.point-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 52px;
  font-weight: 700;
  color: #1A1A1A;
}

.body-text {
  font-size: 42px;
  font-weight: 400;
  color: #333;
  line-height: 1.75;
}

.highlight {
  color: #FF6B6B;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 50px;
  right: 60px;
  font-size: 28px;
  color: #BBB;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.03"/>
</svg>

<div class="bg-shape bg-shape-1"></div>
<div class="bg-shape bg-shape-2"></div>

<div class="content">
  <span class="label">天花板一</span>
  <h2 class="point-title">算力</h2>
  <p class="body-text">跑AI需要巨量的电力和芯片<br>这些资源不是无限的</p>
  <p class="body-text">连Anthropic自己都说<br>不能太执着于安全性<br>怕被别人超过去</p>
  <p class="body-text"><span class="highlight">头部公司差距在缩小<br>进步速度在放缓</span></p>
</div>

<div class="page-number">3 / 8</div>

</body>
</html>
