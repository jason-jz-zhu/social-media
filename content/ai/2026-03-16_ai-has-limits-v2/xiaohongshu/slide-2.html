<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
  background: #FFF9F5;
  position: relative;
}

.grain {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

.bg-shape-1 {
  position: absolute;
  width: 600px;
  height: 600px;
  top: -100px;
  right: -150px;
  background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
  filter: blur(120px);
  z-index: 0;
}

.bg-shape-2 {
  position: absolute;
  width: 500px;
  height: 500px;
  bottom: 100px;
  left: -100px;
  background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%);
  filter: blur(120px);
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  padding: 100px;
  max-width: 880px;
  gap: 48px;
}

.content p {
  font-size: 42px;
  font-weight: 400;
  color: #333;
  line-height: 1.75;
}

.highlight {
  color: #FF6B6B;
  font-weight: 700;
}

.page-number {
  position: absolute;
  bottom: 50px;
  right: 60px;
  font-size: 28px;
  color: #BBB;
  letter-spacing: 2px;
  z-index: 5;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.03"/>
</svg>

<div class="bg-shape-1"></div>
<div class="bg-shape-2"></div>

<div class="content">
  <p>你有没有想过一个问题</p>
  <p>AI发展这么快<br>到底什么时候是个头？</p>
  <p>很多人觉得<br>AI会一直指数级增长下去</p>
  <p>但我越想越觉得<br>它一定会碰到<span class="highlight">一个天花板</span></p>
</div>

<div class="page-number">2 / 8</div>

</body>
</html>
