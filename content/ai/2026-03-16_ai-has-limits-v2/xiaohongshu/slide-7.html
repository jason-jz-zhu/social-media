<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 7</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFF9F5;
  position: relative;
  overflow: hidden;
  font-family: 'Noto Sans SC', sans-serif;
}

.grain {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

.bg-shape-1 {
  position: absolute;
  width: 600px; height: 600px;
  top: -100px; right: -150px;
  background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
  filter: blur(120px);
  border-radius: 50%;
}

.bg-shape-2 {
  position: absolute;
  width: 500px; height: 500px;
  bottom: -50px; left: -100px;
  background: radial-gradient(circle, rgba(255,107,107,0.06) 0%, transparent 70%);
  filter: blur(120px);
  border-radius: 50%;
}

.content {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  height: 100%;
  padding: 100px;
  gap: 40px;
}

.label-pill {
  background: #FF6B6B;
  color: #fff;
  font-size: 32px;
  font-weight: 700;
  padding: 10px 28px;
  border-radius: 20px;
  display: inline-block;
}

.point-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 700;
  color: #1A1A1A;
}

.items {
  display: flex;
  flex-direction: column;
  gap: 36px;
  width: 100%;
}

.item {
  display: flex;
  align-items: center;
  gap: 24px;
}

.item-number {
  width: 48px;
  height: 48px;
  background: rgba(255,107,107,0.12);
  color: #FF6B6B;
  font-weight: 700;
  font-size: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.item-text {
  font-size: 40px;
  color: #333;
  line-height: 1.7;
}

.result-box {
  background: rgba(255,107,107,0.05);
  border-radius: 16px;
  border-left: 4px solid rgba(255,107,107,0.3);
  padding: 20px 28px;
  font-size: 34px;
  color: #888;
  line-height: 1.6;
  width: 100%;
}

.page-number {
  position: absolute;
  bottom: 50px;
  right: 60px;
  font-size: 28px;
  color: #BBB;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="0.03"/>
</svg>

<div class="bg-shape-1"></div>
<div class="bg-shape-2"></div>

<div class="content">
  <div class="label-pill">一张图看懂</div>
  <div class="point-title">三个天花板 = 一个平衡点</div>

  <div class="items">
    <div class="item">
      <div class="item-number">1</div>
      <div class="item-text">算力天花板 — 电力、芯片有限</div>
    </div>
    <div class="item">
      <div class="item-number">2</div>
      <div class="item-text">成本天花板 — AI费用 ≈ 工程师工资</div>
    </div>
    <div class="item">
      <div class="item-number">3</div>
      <div class="item-text">时间天花板 — 人的注意力有上限</div>
    </div>
  </div>

  <div class="result-box">
    三者叠加 → 一定会形成平衡点<br>不是所有人被取代，而是门槛变高
  </div>
</div>

<div class="page-number">7 / 8</div>

</body>
</html>
