<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 4 - 模型升级历史</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .container {
    padding: 70px 70px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-block;
    background: #0EA5E9;
    color: #FFFFFF;
    font-size: 24px;
    font-weight: 500;
    padding: 6px 20px;
    border-radius: 16px;
    margin-bottom: 28px;
    align-self: flex-start;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 44px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 36px;
  }

  .evolution-track {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
  }

  .evolution-track::before {
    content: '';
    position: absolute;
    left: 36px;
    top: 36px;
    bottom: 36px;
    width: 4px;
    background: linear-gradient(to bottom, #E5E7EB 0%, #F59E0B 33%, #F97316 66%, #0EA5E9 100%);
    border-radius: 2px;
    z-index: 0;
  }

  .evo-step {
    display: flex;
    align-items: stretch;
    gap: 24px;
    position: relative;
    z-index: 1;
    flex: 1;
  }

  .evo-node {
    width: 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
    flex-shrink: 0;
  }

  .evo-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .evo-dot.grey { background: #D1D5DB; }
  .evo-dot.yellow { background: #F59E0B; }
  .evo-dot.orange { background: #F97316; }
  .evo-dot.teal { background: #0EA5E9; }

  .evo-card {
    flex: 1;
    border-radius: 18px;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .evo-card.level-a {
    background: #F9FAFB;
    border: 1px solid #E5E7EB;
  }
  .evo-card.level-b {
    background: #FFFBEB;
    border: 1px solid #FDE68A;
  }
  .evo-card.level-c {
    background: #FFF7ED;
    border: 1px solid #FED7AA;
  }
  .evo-card.level-d {
    background: #F0F9FF;
    border: 2px solid rgba(14, 165, 233, 0.4);
  }

  .evo-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }

  .evo-run {
    font-size: 20px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 8px;
  }
  .evo-run.a { background: #E5E7EB; color: #6B7280; }
  .evo-run.b { background: #FDE68A; color: #92400E; }
  .evo-run.c { background: #FED7AA; color: #9A3412; }
  .evo-run.d { background: #0EA5E9; color: #fff; }

  .evo-name {
    font-size: 28px;
    font-weight: 700;
    color: #1A1A1A;
  }

  .evo-change {
    font-size: 24px;
    color: #16A34A;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .evo-same {
    font-size: 22px;
    color: #999;
  }

  .bottom-note {
    margin-top: 24px;
    background: #1A1A1A;
    border-radius: 16px;
    padding: 26px 32px;
    text-align: center;
    margin-bottom: 60px;
  }
  .bottom-note .text {
    font-size: 28px;
    color: #fff;
    line-height: 1.6;
  }
  .bottom-note .teal {
    color: #0EA5E9;
    font-weight: 700;
  }

  .page-number {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="badge">历史回顾</div>
    <h1 class="title">每次模型升级，什么变了什么没变</h1>

    <div class="evolution-track">
      <div class="evo-step">
        <div class="evo-node"><div class="evo-dot grey"></div></div>
        <div class="evo-card level-a">
          <div class="evo-header">
            <div class="evo-run a">2023</div>
            <div class="evo-name">GPT-3.5 → GPT-4</div>
          </div>
          <div class="evo-change">变了：推理能力飞跃，能做复杂分析</div>
          <div class="evo-same">没变：仍然会幻觉，仍需人工验证</div>
        </div>
      </div>

      <div class="evo-step">
        <div class="evo-node"><div class="evo-dot yellow"></div></div>
        <div class="evo-card level-b">
          <div class="evo-header">
            <div class="evo-run b">2024</div>
            <div class="evo-name">Claude 2 → Claude 3</div>
          </div>
          <div class="evo-change">变了：长上下文，能读整个代码库</div>
          <div class="evo-same">没变：仍需结构化prompt，仍需拆解任务</div>
        </div>
      </div>

      <div class="evo-step">
        <div class="evo-node"><div class="evo-dot orange"></div></div>
        <div class="evo-card level-c">
          <div class="evo-header">
            <div class="evo-run c">2025</div>
            <div class="evo-name">Opus 4.5 → 4.6</div>
          </div>
          <div class="evo-change">变了：Agentic能力，能自主操作工具</div>
          <div class="evo-same">没变：仍需harness架构，仍有自评偏差</div>
        </div>
      </div>

      <div class="evo-step">
        <div class="evo-node"><div class="evo-dot teal"></div></div>
        <div class="evo-card level-d">
          <div class="evo-header">
            <div class="evo-run d">2026?</div>
            <div class="evo-name">Mythos (Step Change)</div>
          </div>
          <div class="evo-change">可能变：任务复杂度上限再提一个台阶</div>
          <div class="evo-same">大概率没变：验证和反馈的必要性</div>
        </div>
      </div>
    </div>

    <div class="bottom-note">
      <div class="text">规律：每次升级<span class="teal">输出质量提升</span>，但<span class="teal">验证需求从未消失</span></div>
    </div>
  </div>

  <div class="page-number">4 / 7</div>
</body>
</html>
