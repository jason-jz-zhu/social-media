<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Scene 06</title>
<link rel="stylesheet" href="style.css">
<style>
  .stage { flex-direction: column; align-items: stretch; justify-content: flex-start; gap: 6px; padding-top: 10px; }
  .head-block { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .head-block .headline { font-size: 66px; }
  .illus { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .stamps { right: 12px; top: 10px; }
</style>
</head>
<body>
<div class="plate">
  <header class="masthead">
    <span class="brand">电力革命 × AI<span class="en">THE ELECTRIC PARALLEL</span></span>
    <span class="issue">AI SERIES · <span class="no">VOL.10</span></span>
  </header>
  <main class="stage">
    <div class="head-block">
      <span class="kicker">特斯拉的两笔账</span>
      <div class="headline">发明的人 ≠ 数钱的人</div>
    </div>
    <div class="illus">
      <svg width="1560" height="600" viewBox="0 0 1560 600">
        <defs><filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="3.5"/></filter></defs>

        <!-- bulb string across the top — the ONLY accent element: the lights he lit -->
        <g filter="url(#rough)">
          <path d="M0 38 Q130 92 260 42 Q390 94 520 40 Q650 90 780 44 Q910 94 1040 40 Q1170 88 1300 44 Q1430 92 1560 38" stroke="#FF6B6B" stroke-width="4" fill="none"/>
          <rect x="124" y="64" width="12" height="9" fill="#FF6B6B"/><circle cx="130" cy="86" r="12" stroke="#FF6B6B" stroke-width="3.5" fill="rgba(255,107,107,0.22)"/>
          <rect x="384" y="66" width="12" height="9" fill="#FF6B6B"/><circle cx="390" cy="88" r="12" stroke="#FF6B6B" stroke-width="3.5" fill="rgba(255,107,107,0.22)"/>
          <rect x="644" y="64" width="12" height="9" fill="#FF6B6B"/><circle cx="650" cy="86" r="12" stroke="#FF6B6B" stroke-width="3.5" fill="rgba(255,107,107,0.22)"/>
          <rect x="904" y="66" width="12" height="9" fill="#FF6B6B"/><circle cx="910" cy="88" r="12" stroke="#FF6B6B" stroke-width="3.5" fill="rgba(255,107,107,0.22)"/>
          <rect x="1164" y="63" width="12" height="9" fill="#FF6B6B"/><circle cx="1170" cy="85" r="12" stroke="#FF6B6B" stroke-width="3.5" fill="rgba(255,107,107,0.22)"/>
          <rect x="1424" y="66" width="12" height="9" fill="#FF6B6B"/><circle cx="1430" cy="88" r="12" stroke="#FF6B6B" stroke-width="3.5" fill="rgba(255,107,107,0.22)"/>
        </g>

        <!-- divider between the two moments -->
        <line x1="780" y1="150" x2="780" y2="520" stroke="rgba(30,42,58,0.28)" stroke-width="3" stroke-dasharray="14 12"/>

        <!-- LEFT: Tesla hands over the patent scroll, gets a small bag of money -->
        <g filter="url(#rough)">
          <!-- Tesla -->
          <circle cx="210" cy="225" r="22" fill="#1E2A3A"/>
          <path d="M210 247 L206 360 M206 360 L182 505 M206 360 L232 505 M210 280 L300 315 M210 280 L160 350" stroke="#1E2A3A" stroke-width="11" fill="none" stroke-linecap="round"/>
          <!-- scroll in his hand -->
          <g transform="rotate(-8 355 305)">
            <rect x="305" y="288" width="100" height="32" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="4"/>
            <circle cx="305" cy="304" r="10" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="4"/>
            <circle cx="405" cy="304" r="10" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="4"/>
            <path d="M325 298 H385 M325 310 H372" stroke="#1E2A3A" stroke-width="3" fill="none"/>
          </g>
          <!-- buyer in a top hat -->
          <circle cx="585" cy="225" r="22" fill="#1E2A3A"/>
          <rect x="563" y="176" width="44" height="30" fill="#1E2A3A"/>
          <path d="M550 206 L620 206" stroke="#1E2A3A" stroke-width="6" stroke-linecap="round"/>
          <path d="M585 247 L590 360 M590 360 L566 505 M590 360 L616 505 M585 280 L495 318 M585 280 L638 352" stroke="#1E2A3A" stroke-width="11" fill="none" stroke-linecap="round"/>
          <!-- small money bag with $ -->
          <path d="M460 296 L452 312 M488 296 L496 312" stroke="#1E2A3A" stroke-width="4" fill="none"/>
          <path d="M450 312 L498 312" stroke="#1E2A3A" stroke-width="5" fill="none"/>
          <path d="M452 314 Q426 350 448 378 Q474 400 500 378 Q522 350 496 314 Z" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="4"/>
          <text x="474" y="368" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#1E2A3A" text-anchor="middle">$</text>
          <!-- exchange arrows -->
          <path d="M425 268 Q465 250 500 260" stroke="#1E2A3A" stroke-width="3.5" fill="none"/>
          <path d="M506 262 L486 252 L491 272 Z" fill="#1E2A3A"/>
          <path d="M508 414 Q460 430 414 416" stroke="#1E2A3A" stroke-width="3.5" fill="none"/>
          <path d="M408 414 L428 406 L425 426 Z" fill="#1E2A3A"/>
          <!-- ground -->
          <path d="M120 508 H660" stroke="#1E2A3A" stroke-width="5" stroke-linecap="round"/>
        </g>
        <text x="390" y="568" font-family="'Noto Sans SC', sans-serif" font-size="25" font-weight="700" letter-spacing="4" fill="rgba(30,42,58,0.62)" text-anchor="middle">递出专利 · 收下一小袋钱</text>

        <!-- RIGHT: same man tearing the royalty contract, scraps flying -->
        <g filter="url(#rough)">
          <circle cx="1170" cy="235" r="22" fill="#1E2A3A"/>
          <path d="M1170 257 L1170 368 M1170 368 L1146 508 M1170 368 L1196 508 M1170 285 L1082 226 M1170 285 L1258 230" stroke="#1E2A3A" stroke-width="11" fill="none" stroke-linecap="round"/>
          <!-- torn half (left) -->
          <g transform="rotate(-10 1040 205)">
            <path d="M998 162 L1088 152 L1076 172 L1090 192 L1076 212 L1088 232 L1078 252 L992 258 Z" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="4"/>
            <path d="M1012 186 H1060 M1010 206 H1052 M1008 226 H1056" stroke="#1E2A3A" stroke-width="3" fill="none"/>
          </g>
          <!-- torn half (right) -->
          <g transform="rotate(10 1310 200)">
            <path d="M1272 152 L1362 162 L1356 250 L1266 244 L1278 226 L1264 206 L1278 186 L1266 168 Z" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="4"/>
            <path d="M1288 186 H1336 M1290 206 H1340 M1292 226 H1330" stroke="#1E2A3A" stroke-width="3" fill="none"/>
          </g>
          <!-- scraps spinning down -->
          <rect x="990" y="330" width="26" height="18" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="3" transform="rotate(28 1003 339)"/>
          <rect x="1345" y="316" width="26" height="18" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="3" transform="rotate(-24 1358 325)"/>
          <rect x="1078" y="420" width="26" height="18" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="3" transform="rotate(-16 1091 429)"/>
          <rect x="1282" y="432" width="26" height="18" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="3" transform="rotate(42 1295 441)"/>
          <!-- ground -->
          <path d="M980 508 H1370" stroke="#1E2A3A" stroke-width="5" stroke-linecap="round"/>
        </g>
        <text x="1175" y="568" font-family="'Noto Sans SC', sans-serif" font-size="25" font-weight="700" letter-spacing="4" fill="rgba(30,42,58,0.62)" text-anchor="middle">转头撕碎版税合同</text>
      </svg>
    </div>
    <div class="stamps">
      <span class="stamp">1888</span>
      <span class="stamp">$6万</span>
      <span class="stamp accent">撕掉版税</span>
    </div>
  </main>
  <footer class="colophon">
    <span>PAUL DAVID · THE DYNAMO AND THE COMPUTER · 1990</span>
    <span class="page">SCENE <b>06</b> / 17</span>
  </footer>
</div>
</body>
</html>
