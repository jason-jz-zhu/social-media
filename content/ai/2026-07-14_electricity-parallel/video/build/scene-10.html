<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Scene 10</title>
<link rel="stylesheet" href="style.css">
<style>
  .stage { gap: 50px; }

  .copy-wrap { flex: 1; display: flex; flex-direction: column; gap: 30px; }
  .copy-wrap .headline { font-size: 66px; }
  .fact-row { display: flex; align-items: center; gap: 18px; font-size: 28px; font-weight: 700; }

    <div class="copy-wrap">
      <span class="kicker">1900s · 工厂电气化第一步</span>
      <div class="headline">换了<span class="hl">心脏</span>，<br>没换骨架</div>
      <div class="fact-row"><span class="tick"></span>蒸汽机拆了 · 装上大电机</div>
      <div class="fact-row"><span class="tick"></span>天花板那根长轴 · 原封不动</div>
      <div class="fact-row muted"><span class="tick"></span>皮带照旧 · 机器照旧 · 布局照旧</div>
    </div>
    <div class="stamps">
      <span class="stamp">一根长轴</span>
      <span class="stamp accent">什么都没变</span>

  </main>
  <footer class="colophon">
    <span>PAUL DAVID · THE DYNAMO AND THE COMPUTER · 1990</span>

</div>
