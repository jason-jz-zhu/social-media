<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Scene 02</title>
<link rel="stylesheet" href="style.css">
<style>
  .stage { gap: 60px; }
  .illus-wrap { flex: 1.3; display: flex; align-items: center; justify-content: center; }
  .copy-wrap { flex: 1; display: flex; flex-direction: column; gap: 30px; }
  .copy-wrap .headline { font-size: 64px; }
  .fact-row { display: flex; align-items: center; gap: 18px; font-size: 30px; font-weight: 700; }
  .fact-row .tick { width: 30px; border-top: 4px solid var(--accent); }
  .fact-row .muted { color: var(--ink-soft); }
  .stamps { right: 12px; top: 10px; }
</style>
</head>
<body>
<div class="plate">
  <header class="masthead">
    <span class="brand">电力革命 × AI<span class="en">THE ELECTRIC PARALLEL</span></span>
    <span class="issue">AI SERIES · <span class="no">VOL.10</span></span>
  </header>
  <main class="stage">
    <div class="illus-wrap">
      <svg width="640" height="600" viewBox="0 0 640 600">
        <defs><filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="3.5"/></filter></defs>
        <!-- building + signboard -->
        <g filter="url(#rough)" stroke="#1E2A3A" fill="none" stroke-width="5">
          <rect x="60" y="120" width="520" height="90" fill="rgba(30,42,58,0.06)"/>
          <rect x="60" y="210" width="520" height="290"/>
          <line x1="150" y1="210" x2="150" y2="500"/><line x1="250" y1="210" x2="250" y2="500"/>
          <line x1="390" y1="210" x2="390" y2="500"/><line x1="490" y1="210" x2="490" y2="500"/>
        </g>
        <!-- old sign being taken down -->
        <g filter="url(#rough)">
          <text x="110" y="182" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#1E2A3A" text-decoration="line-through" transform="rotate(-7 110 182)">EDISON</text>
          <text x="420" y="180" font-family="Georgia, serif" font-size="66" font-weight="bold" fill="#FF6B6B">GE</text>
        </g>
        <!-- figure walking away with falling papers -->
        <g filter="url(#rough)">
          <circle cx="560" cy="330" r="20" fill="#1E2A3A"/>
          <path d="M560 350 L552 420 L540 490 M560 350 L570 420 L582 490 M560 368 L532 400 M560 368 L590 396" stroke="#1E2A3A" stroke-width="10" fill="none" stroke-linecap="round"/>
          <rect x="500" y="430" width="34" height="24" fill="none" stroke="#1E2A3A" stroke-width="3" transform="rotate(14 500 430)"/>
          <rect x="470" y="470" width="34" height="24" fill="none" stroke="#1E2A3A" stroke-width="3" transform="rotate(-11 470 470)"/>
        </g>
        <!-- DC -> AC wave -->
        <g filter="url(#rough)" stroke-width="5" fill="none">
          <path d="M80 560 H240" stroke="#1E2A3A" stroke-dasharray="26 12"/>
          <path d="M300 560 q20 -34 40 0 q20 34 40 0 q20 -34 40 0 q20 34 40 0" stroke="#FF6B6B"/>
          <path d="M255 546 l30 14 l-30 14 Z" fill="#1E2A3A" stroke="none"/>
        </g>
      </svg>
    </div>
    <div class="copy-wrap">
      <span class="kicker">摩根主导的合并</span>
      <div class="headline">招牌换了<br>他的股份<span class="hl">清得一干二净</span></div>
      <div class="fact-row"><span class="tick"></span>1892 · Edison General Electric → GE</div>
      <div class="fact-row"><span class="tick"></span>1894 · 股份全部卖出</div>
      <div class="fact-row muted"><span class="tick"></span>随后 GE 转向交流电</div>
    </div>
    <div class="stamps">
      <span class="stamp">1894 清仓</span>
      <span class="stamp accent">GE → 交流电</span>
    </div>
  </main>
  <footer class="colophon">
    <span>PAUL DAVID · THE DYNAMO AND THE COMPUTER · 1990</span>
    <span class="page">SCENE <b>02</b> / 17</span>
  </footer>
</div>
</body>
</html>
