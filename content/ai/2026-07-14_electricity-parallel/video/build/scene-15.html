<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Scene 15</title>
<link rel="stylesheet" href="style.css">
<style>
  .stage { gap: 52px; }
  .copy-wrap { flex: 1; display: flex; flex-direction: column; gap: 30px; }
  .copy-wrap .headline { font-size: 60px; }
  .fact-row { display: flex; align-items: center; gap: 18px; font-size: 29px; font-weight: 700; }
  .fact-row .tick { width: 30px; border-top: 4px solid var(--ink); }
  .fact-row .muted { color: var(--ink-soft); }
  .fact-row.muted { color: var(--ink-soft); }
  .ink-note { font-size: 26px; }
  .chart-wrap { flex: 0 0 1020px; position: relative; height: 620px; }
  .stamps { right: 12px; top: 10px; }
</style>
</head>
<body>
<div class="plate">
  <header class="masthead">
    <span class="brand">电力革命 × AI<span class="en">THE ELECTRIC PARALLEL</span></span>
    <span class="issue">AI SERIES · <span class="no">VOL.10</span></span>
  </header>
  <main class="stage">
    <div class="copy-wrap">
      <span class="kicker">1929 → 1932</span>
      <div class="headline">空窗期不是暂停键<br>是筛选期</div>
      <div class="fact-row"><span class="tick"></span>涨上去：8 个月 · 五倍</div>
      <div class="fact-row muted"><span class="tick"></span>跌下来：三年 · 归零</div>
      <div class="rule-dashed"></div>
      <div class="ink-note">—— 曲线的尽头，是地铁站台的一张长椅 ——</div>
    </div>
    <div class="chart-wrap">
      <div class="halftone" style="position:absolute; left:58px; bottom:62px; width:400px; height:46px; opacity:0.18;"></div>
      <svg width="1020" height="620" viewBox="0 0 1020 620" style="position:relative;">
        <defs><filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="2" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="3.5"/></filter></defs>
        <!-- axes: y + baseline (baseline doubles as the metro platform) -->
        <path filter="url(#rough)" d="M50 44 V560 H990" stroke="#1E2A3A" stroke-width="4" fill="none"/>
        <text x="50" y="26" font-family="'Noto Sans SC', sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="rgba(30,42,58,0.62)">股价 · STOCK PRICE</text>
        <text x="66" y="600" font-family="'Noto Sans SC', sans-serif" font-size="24" font-weight="700" letter-spacing="2" fill="rgba(30,42,58,0.62)">1928</text>
        <!-- lamp light cone (behind bench scene) -->
        <path d="M848 246 L796 532 L902 532 Z" fill="rgba(30,42,58,0.06)"/>
        <!-- hanging lamp -->
        <g filter="url(#rough)" stroke="#1E2A3A" fill="none">
          <line x1="834" y1="118" x2="864" y2="118" stroke-width="5"/>
          <line x1="849" y1="118" x2="849" y2="202" stroke-width="4"/>
          <path d="M827 234 L849 204 L871 234 Z" fill="#1E2A3A" stroke="none"/>
          <circle cx="849" cy="244" r="9" stroke-width="4"/>
        </g>
        <!-- bench -->
        <g filter="url(#rough)" stroke="#1E2A3A" fill="none">
          <line x1="784" y1="452" x2="916" y2="452" stroke-width="6"/>
          <line x1="804" y1="452" x2="804" y2="498" stroke-width="4"/>
          <line x1="836" y1="452" x2="836" y2="498" stroke-width="4"/>
          <line x1="868" y1="452" x2="868" y2="498" stroke-width="4"/>
          <line x1="898" y1="452" x2="898" y2="498" stroke-width="4"/>
          <line x1="778" y1="500" x2="922" y2="500" stroke-width="7"/>
          <line x1="794" y1="500" x2="794" y2="558" stroke-width="6"/>
          <line x1="906" y1="500" x2="906" y2="558" stroke-width="6"/>
        </g>
        <!-- lonely figure, back view, hunched on the bench -->
        <g filter="url(#rough)">
          <circle cx="851" cy="410" r="17" fill="#1E2A3A"/>
          <path d="M851 427 Q843 462 846 500 M851 443 Q830 466 835 498 M851 443 Q872 466 867 498" stroke="#1E2A3A" stroke-width="10" fill="none" stroke-linecap="round"/>
        </g>
        <!-- slow early phase -->
        <path filter="url(#rough)" d="M70 542 Q160 536 250 530 T420 508 L520 488" stroke="#1E2A3A" stroke-width="6" fill="none" stroke-linecap="round"/>
        <!-- 8-month vertical surge : the single accent focal -->
        <path filter="url(#rough)" d="M520 488 C560 458 586 300 600 108" stroke="#FF6B6B" stroke-width="9" fill="none" stroke-linecap="round"/>
        <!-- peak marker + 1929 -->
        <circle filter="url(#rough)" cx="601" cy="104" r="9" fill="#FAF3E7" stroke="#1E2A3A" stroke-width="5"/>
        <text x="566" y="64" font-family="'Noto Serif SC', serif" font-size="36" font-weight="900" fill="#1E2A3A">1929</text>
        <!-- cliff fall to zero : ink dashed -->
        <path filter="url(#rough)" d="M604 114 C618 250 624 390 648 468 C660 514 682 546 716 558" stroke="#1E2A3A" stroke-width="7" fill="none" stroke-dasharray="16 13" stroke-linecap="round"/>
        <text x="676" y="602" font-family="'Noto Serif SC', serif" font-size="36" font-weight="900" fill="#1E2A3A">1932</text>
      </svg>
    </div>
    <div class="stamps">
      <span class="stamp accent">8个月×5</span>
      <span class="stamp">1932破产</span>
      <span class="stamp">-$8亿</span>
    </div>
  </main>
  <footer class="colophon">
    <span>PAUL DAVID · THE DYNAMO AND THE COMPUTER · 1990</span>
    <span class="page">SCENE <b>15</b> / 17</span>
  </footer>
</div>
</body>
</html>
