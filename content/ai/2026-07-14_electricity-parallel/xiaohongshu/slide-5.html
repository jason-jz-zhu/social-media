<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Slide 5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; background: #FAF3E7; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; }
  .slide { width: 1080px; height: 1440px; padding: 100px 80px; display: flex; flex-direction: column; position: relative; }
  .badge { align-self: flex-start; background: #FF6B6B; color: #FFF; font-size: 24px; font-weight: 700; padding: 8px 22px; letter-spacing: 3px; margin-bottom: 34px; border-radius: 4px; }
  .title { font-family: 'Noto Serif SC', serif; font-size: 60px; font-weight: 900; color: #1E2A3A; line-height: 1.3; margin-bottom: 40px; }
  .title .hl { color: #FF6B6B; }
  .title::after { content: ''; display: block; width: 70px; height: 4px; background: #FF6B6B; margin-top: 22px; border-radius: 2px; }
  .chart { background: #FFF; padding: 32px 28px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 20px rgba(30,42,58,0.06); }
  .chart .lbl { font-size: 22px; color: #C89860; letter-spacing: 3px; margin-bottom: 20px; font-weight: 700; text-align: center; }
  .bars { display: flex; align-items: flex-end; gap: 8px; height: 220px; margin-bottom: 12px; }
  .bar { flex: 1; background: #C89860; border-radius: 4px 4px 0 0; position: relative; }
  .bar.spike { background: #FF6B6B; }
  .bar .v { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 900; color: #1E2A3A; white-space: nowrap; }
  .years { display: flex; gap: 8px; }
  .years span { flex: 1; text-align: center; font-size: 20px; color: #666; }
  .comparison { display: flex; gap: 20px; margin-bottom: 30px; }
  .side { flex: 1; text-align: center; padding: 22px 16px; border-radius: 8px; }
  .side .lbl { font-size: 22px; letter-spacing: 3px; margin-bottom: 10px; }
  .side .val { font-family: 'Noto Serif SC', serif; font-size: 44px; font-weight: 900; }
  .side.a { background: rgba(200,152,96,0.15); } .side.a .lbl { color: #C89860; } .side.a .val { color: #1E2A3A; }
  .side.b { background: rgba(255,107,107,0.15); } .side.b .lbl { color: #FF6B6B; } .side.b .val { color: #FF6B6B; }
  .kicker { font-family: 'Noto Serif SC', serif; font-size: 40px; color: #1E2A3A; font-weight: 900; text-align: center; margin-top: auto; padding: 20px 0; line-height: 1.5; }
  .kicker .hl { color: #FF6B6B; }
  .page-number { position: absolute; bottom: 60px; right: 80px; font-size: 26px; color: #C89860; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="slide">
  <span class="badge">类比 · 03 · 王炸</span>
  <h1 class="title">30 年<span class="hl">生产力空窗</span></h1>
  <div class="chart">
    <div class="lbl">美国制造业 TFP 年增速</div>
    <div class="bars">
      <div class="bar" style="height:15%"><span class="v">&lt;1%</span></div>
      <div class="bar" style="height:18%"></div>
      <div class="bar" style="height:14%"></div>
      <div class="bar" style="height:20%"></div>
      <div class="bar" style="height:16%"></div>
      <div class="bar" style="height:22%"></div>
      <div class="bar spike" style="height:88%"><span class="v">&gt;5%</span></div>
    </div>
    <div class="years"><span>1890</span><span>1895</span><span>1900</span><span>1905</span><span>1910</span><span>1915</span><span>1919-29</span></div>
  </div>
  <div class="comparison">
    <div class="side a"><div class="lbl">前 30 年</div><div class="val">趴着</div></div>
    <div class="side b"><div class="lbl">1919-1929</div><div class="val">起飞</div></div>
  </div>
  <div class="kicker">ChatGPT 才出来 <span class="hl">3 年</span><br>你的焦虑，<span class="hl">太正常了</span></div>
  <span class="page-number">5 / 8</span>
</div>
</body>
</html>
