<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Slide 4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; background: #FAF3E7; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; }
  .slide { width: 1080px; height: 1440px; padding: 100px 80px; display: flex; flex-direction: column; position: relative; }
  .badge { align-self: flex-start; background: #1E2A3A; color: #C89860; font-size: 24px; font-weight: 700; padding: 8px 22px; letter-spacing: 3px; margin-bottom: 34px; border-radius: 4px; }
  .year-tag { display: inline-block; background: #FFF; color: #C89860; font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 900; padding: 10px 26px; border: 2px solid #C89860; border-radius: 30px; margin-bottom: 30px; letter-spacing: 2px; }
  .title { font-family: 'Noto Serif SC', serif; font-size: 58px; font-weight: 900; color: #1E2A3A; line-height: 1.35; margin-bottom: 30px; }
  .title .hl { color: #FF6B6B; }
  .title::after { content: ''; display: block; width: 70px; height: 4px; background: #FF6B6B; margin-top: 22px; border-radius: 2px; }
  .facts { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
  .fact { background: #FFF; padding: 26px 30px; border-radius: 8px; display: flex; align-items: center; gap: 24px; box-shadow: 0 2px 10px rgba(30,42,58,0.05); }
  .fact .n { font-family: 'Noto Serif SC', serif; font-size: 44px; font-weight: 900; color: #FF6B6B; flex: 0 0 60px; }
  .fact .t { font-size: 30px; color: #333; line-height: 1.5; }
  .fact .t b { color: #1E2A3A; font-weight: 900; }
  .kicker { font-family: 'Noto Serif SC', serif; font-size: 46px; color: #1E2A3A; font-weight: 900; text-align: center; margin-top: auto; padding: 24px 0; line-height: 1.5; }
  .kicker .hl { color: #FF6B6B; }
  .kicker .sep { color: #C89860; font-weight: 400; padding: 0 12px; }
  .page-number { position: absolute; bottom: 60px; right: 80px; font-size: 26px; color: #C89860; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="slide">
  <span class="badge">类比 · 02</span>
  <span class="year-tag">1888 年</span>
  <h1 class="title">特斯拉发明 AC<br><span class="hl">却没赚到钱</span></h1>
  <div class="facts">
    <div class="fact"><div class="n">$60K</div><div class="t">卖掉<b>所有 AC 专利</b>给西屋</div></div>
    <div class="fact"><div class="n">✎</div><div class="t">后来主动<b>撕掉版税合同</b>救西屋</div></div>
    <div class="fact"><div class="n">†</div><div class="t">最后<b>穷困潦倒</b>死于纽约旅馆</div></div>
  </div>
  <div class="kicker">写 paper 的人<span class="sep">≠</span><span class="hl">收钱的人</span></div>
  <span class="page-number">4 / 8</span>
</div>
</body>
</html>
