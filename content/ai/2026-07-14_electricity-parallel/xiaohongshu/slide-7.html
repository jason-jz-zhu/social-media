<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Slide 7</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1440px; background: #FAF3E7; font-family: 'Noto Sans SC', sans-serif; position: relative; overflow: hidden; }
  .slide { width: 1080px; height: 1440px; padding: 100px 80px; display: flex; flex-direction: column; position: relative; }
  .badge { align-self: flex-start; background: #1E2A3A; color: #C89860; font-size: 24px; font-weight: 700; padding: 8px 22px; letter-spacing: 3px; margin-bottom: 34px; border-radius: 4px; }
  .title { font-family: 'Noto Serif SC', serif; font-size: 60px; font-weight: 900; color: #1E2A3A; line-height: 1.3; margin-bottom: 30px; }
  .title .hl { color: #FF6B6B; }
  .title::after { content: ''; display: block; width: 70px; height: 4px; background: #FF6B6B; margin-top: 22px; border-radius: 2px; }
  .timeline { position: relative; margin: 30px 0 34px; padding: 20px 0; }
  .tline { position: absolute; top: 60px; left: 40px; right: 40px; height: 3px; background: repeating-linear-gradient(90deg, #C89860 0 12px, transparent 12px 20px); }
  .points { display: flex; justify-content: space-between; position: relative; }
  .pt { text-align: center; width: 240px; }
  .pt .dot { width: 24px; height: 24px; background: #C89860; border-radius: 50%; margin: 0 auto 12px; position: relative; z-index: 2; border: 4px solid #FAF3E7; }
  .pt.hero .dot { background: #FF6B6B; width: 32px; height: 32px; margin-top: -4px; }
  .pt .year { font-family: 'Noto Serif SC', serif; font-size: 38px; font-weight: 900; color: #1E2A3A; }
  .pt.hero .year { color: #FF6B6B; }
  .pt .what { font-size: 24px; color: #666; margin-top: 6px; line-height: 1.4; }
  .pt.hero .what { color: #1E2A3A; font-weight: 700; }
  .gap-note { text-align: center; font-family: 'Noto Serif SC', serif; font-size: 30px; color: #C89860; font-weight: 700; margin-bottom: 24px; }
  .gap-note .hl { color: #FF6B6B; }
  .insight { background: #1E2A3A; padding: 30px 34px; border-radius: 10px; }
  .insight .lbl { font-size: 22px; color: #C89860; letter-spacing: 3px; margin-bottom: 12px; font-weight: 700; }
  .insight .txt { font-family: 'Noto Serif SC', serif; font-size: 34px; color: #FDF6E8; line-height: 1.5; font-weight: 700; }
  .insight .txt .hl { color: #FF6B6B; }
  .kicker { font-family: 'Noto Serif SC', serif; font-size: 34px; color: #1E2A3A; text-align: center; font-weight: 900; margin-top: auto; padding: 20px 0; line-height: 1.5; }
  .kicker .hl { color: #FF6B6B; }
  .page-number { position: absolute; bottom: 60px; right: 80px; font-size: 26px; color: #C89860; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="slide">
  <span class="badge">类比 · 05</span>
  <h1 class="title">福特才是<br>电力革命<span class="hl">真正的赢家</span></h1>
  <div class="timeline">
    <div class="tline"></div>
    <div class="points">
      <div class="pt"><div class="dot"></div><div class="year">1882</div><div class="what">爱迪生<br>发电站</div></div>
      <div class="pt"><div class="dot"></div><div class="year">1892</div><div class="what">GE<br>成立</div></div>
      <div class="pt hero"><div class="dot"></div><div class="year">1913</div><div class="what">福特<br>流水线</div></div>
    </div>
  </div>
  <div class="gap-note">中间隔了<span class="hl"> 30 年</span></div>
  <div class="insight">
    <div class="lbl">最后的钱去了哪</div>
    <div class="txt">不是发电厂<br>是<span class="hl">重新设计工厂</span>的福特</div>
  </div>
  <div class="kicker">AI 赢家可能不是造模型的<br>是<span class="hl">重新设计流程</span>的人</div>
  <span class="page-number">7 / 8</span>
</div>
</body>
</html>
