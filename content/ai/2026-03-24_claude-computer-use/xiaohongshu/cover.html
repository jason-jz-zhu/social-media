<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude能帮你操作电脑了</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .cover {
    position: relative;
    width: 1080px;
    height: 1440px;
    background: linear-gradient(160deg, #1A1A2E 0%, #16213E 40%, #0F3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 90px;
    overflow: hidden;
  }

  /* Glow shapes */
  .glow-coral {
    position: absolute;
    top: -80px;
    right: -60px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255, 107, 107, 0.3) 0%, transparent 70%);
    filter: blur(100px);
    pointer-events: none;
  }

  .glow-blue {
    position: absolute;
    bottom: -100px;
    left: -80px;
    width: 550px;
    height: 550px;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
    filter: blur(100px);
    pointer-events: none;
  }

  /* Grain texture overlay */
  .grain {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    pointer-events: none;
  }

  /* SVG doodles */
  .doodle-cursor {
    position: absolute;
    top: 280px;
    left: 70px;
    opacity: 0.7;
  }

  .doodle-phone {
    position: absolute;
    top: 350px;
    right: 80px;
    opacity: 0.7;
  }

  /* Content area — pushed slightly above center */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: -100px;
  }

  .title {
    font-size: 100px;
    font-weight: 900;
    color: #FFFFFF;
    line-height: 1.3;
    letter-spacing: 2px;
    margin-bottom: 50px;
  }

  .highlight {
    position: relative;
    display: inline;
  }

  .highlight::after {
    content: '';
    position: absolute;
    left: -6px;
    right: -6px;
    bottom: 8px;
    height: 0.38em;
    background: #FF6B6B;
    opacity: 0.6;
    z-index: -1;
    border-radius: 4px;
  }

  .subtitle {
    font-size: 44px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.6;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="cover">
  <!-- Glow shapes -->
  <div class="glow-coral"></div>
  <div class="glow-blue"></div>

  <!-- SVG doodle: cursor/mouse pointer -->
  <svg class="doodle-cursor" width="100" height="120" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 10 L20 90 L38 72 L56 100 L68 93 L50 65 L75 65 Z" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>

  <!-- SVG doodle: smartphone -->
  <svg class="doodle-phone" width="90" height="140" viewBox="0 0 90 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="8" width="70" height="124" rx="12" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="35" y1="20" x2="55" y2="20" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="45" cy="118" r="6" stroke="white" stroke-width="3.5"/>
  </svg>

  <!-- Content -->
  <div class="content">
    <div class="title">Claude能帮你<br><span class="highlight">操作电脑</span>了</div>
    <div class="subtitle">点鼠标 敲键盘 开应用｜手机也能派任务</div>
  </div>

  <!-- Grain overlay -->
  <div class="grain"></div>
</div>
</body>
</html>
