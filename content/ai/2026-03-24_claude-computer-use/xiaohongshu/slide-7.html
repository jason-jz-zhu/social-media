<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 7 - Golden Quote + CTA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1440px;
    padding: 100px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
  }

  .quote-section {
    margin-bottom: 60px;
  }

  .quote-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 900;
    color: #1A1A1A;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .quote-text .highlight {
    color: #FF6B6B;
  }

  .quote-sub {
    font-size: 40px;
    font-weight: 400;
    color: #666;
    line-height: 1.5;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 60px 0;
    width: 400px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #E0E0E0;
  }

  .divider-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #FF6B6B;
    flex-shrink: 0;
  }

  .cta-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .cta-icon {
    margin-bottom: 12px;
  }

  .cta-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
  }

  .cta-sub {
    font-size: 40px;
    font-weight: 400;
    color: #666;
  }

  .hashtags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    margin-top: 80px;
  }

  .hashtag {
    font-size: 30px;
    font-weight: 400;
    color: #FF6B6B;
    background: rgba(255, 107, 107, 0.06);
    border: 1px solid rgba(255, 107, 107, 0.12);
    border-radius: 24px;
    padding: 10px 28px;
  }

  .page-number {
    position: absolute;
    bottom: 50px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="quote-section">
      <p class="quote-text">AI从「你问它答」<br>变成了「<span class="highlight">你说它做</span>」</p>
      <p class="quote-sub">这才是真正的AI助手</p>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="cta-section">
      <div class="cta-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="10" width="52" height="36" rx="18" stroke="#FF6B6B" stroke-width="3" fill="none"/>
          <circle cx="22" cy="28" r="3" fill="#FF6B6B"/>
          <circle cx="32" cy="28" r="3" fill="#FF6B6B"/>
          <circle cx="42" cy="28" r="3" fill="#FF6B6B"/>
          <path d="M18 46L10 54V46H18Z" stroke="#FF6B6B" stroke-width="3" fill="none" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="cta-title">你最想让AI<br>帮你自动化什么？</p>
      <p class="cta-sub">评论区聊聊</p>
    </div>

    <div class="hashtags">
      <span class="hashtag">#Claude</span>
      <span class="hashtag">#ComputerUse</span>
      <span class="hashtag">#AI自动化</span>
      <span class="hashtag">#Dispatch</span>
    </div>

    <div class="page-number">7 / 7</div>
  </div>
</body>
</html>
