<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 5 - Dispatch：手机派任务</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #FFFFFF;
    font-family: 'Noto Sans SC', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .slide {
    width: 1080px;
    height: 1440px;
    padding: 100px 80px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 60px;
  }

  .content-row {
    display: flex;
    gap: 50px;
    flex: 1;
    align-items: center;
  }

  .left-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .feature-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .feature-list li {
    font-size: 34px;
    font-weight: 400;
    color: #333;
    line-height: 1.6;
    padding-left: 30px;
    position: relative;
  }

  .feature-list li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #FF6B6B;
  }

  .feature-list li.sub {
    font-size: 30px;
    color: #888;
    padding-left: 50px;
  }

  .feature-list li.sub::before {
    left: 30px;
    width: 6px;
    height: 6px;
    background: #CCC;
    top: 16px;
  }

  .highlight-box {
    margin-top: 40px;
    padding: 24px 32px;
    background: #FFF5F5;
    border-radius: 16px;
    border-left: 5px solid #FF6B6B;
  }

  .highlight-box p {
    font-size: 32px;
    font-weight: 700;
    color: #FF6B6B;
    line-height: 1.5;
  }

  .right-mockup {
    width: 340px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .phone-frame {
    width: 300px;
    height: 580px;
    border-radius: 40px;
    border: 4px solid #E0E0E0;
    background: #FAFAFA;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  }

  .phone-notch {
    width: 120px;
    height: 28px;
    background: #E0E0E0;
    border-radius: 0 0 16px 16px;
    margin: 0 auto;
  }

  .phone-screen {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 16px;
  }

  .phone-header {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    color: #1A1A1A;
    padding-bottom: 12px;
    border-bottom: 1px solid #EEE;
  }

  .chat-bubble {
    max-width: 220px;
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 16px;
    line-height: 1.5;
    word-break: break-all;
  }

  .chat-bubble.user {
    background: #FF6B6B;
    color: #FFF;
    align-self: flex-end;
    margin-left: auto;
    border-bottom-right-radius: 6px;
  }

  .chat-bubble.assistant {
    background: #F0F0F0;
    color: #333;
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .phone-input {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #FFF;
    border-radius: 24px;
    border: 1px solid #E0E0E0;
    position: absolute;
    bottom: 20px;
    left: 16px;
    right: 16px;
  }

  .phone-input span {
    font-size: 14px;
    color: #BBB;
  }

  .phone-input .send-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #FF6B6B;
    margin-left: auto;
  }

  .page-number {
    position: absolute;
    bottom: 50px;
    right: 80px;
    font-size: 28px;
    color: #CCC;
    font-family: 'Noto Sans SC', sans-serif;
  }
</style>
</head>
<body>
  <div class="slide">
    <h1 class="title">Dispatch：手机派任务</h1>

    <div class="content-row">
      <div class="left-text">
        <ul class="feature-list">
          <li>手机上打开 Claude App</li>
          <li>给电脑上的 Claude 派任务</li>
          <li>电脑保持开机，Claude 自动执行</li>
          <li>做完了手机收到通知</li>
          <li>甚至支持定时任务</li>
          <li class="sub">每天整理邮件、每周拉数据</li>
        </ul>

        <div class="highlight-box">
          <p>手机派任务，电脑自动执行</p>
        </div>
      </div>

      <div class="right-mockup">
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="phone-header">Claude</div>
            <div class="chat-messages">
              <div class="chat-bubble user">帮我整理桌面文件</div>
              <div class="chat-bubble assistant">收到，正在执行...</div>
            </div>
          </div>
          <div class="phone-input">
            <span>输入消息...</span>
            <div class="send-btn"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="page-number">5 / 7</div>
  </div>
</body>
</html>
