<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1440px;
  background: #FFFFFF;
  font-family: 'Noto Sans SC', sans-serif;
  position: relative;
  overflow: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
  padding: 120px 100px;
  max-width: 920px;
  text-align: left;
}

.section-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 44px;
  font-weight: 700;
  color: #1A1A1A;
  margin-bottom: 36px;
}

.body-text p {
  font-size: 42px;
  font-weight: 400;
  color: #1A1A1A;
  line-height: 1.8;
  margin-bottom: 36px;
}

.highlight {
  color: #FF6B6B;
  font-weight: 700;
}

.tip-box {
  background: rgba(255, 107, 107, 0.05);
  border-left: 4px solid rgba(255, 107, 107, 0.3);
  border-radius: 12px;
  padding: 24px 28px;
  font-size: 34px;
  color: #888;
}

.page-number {
  position: absolute;
  bottom: 60px;
  right: 80px;
  font-size: 28px;
  color: #CCC;
  font-family: 'Noto Sans SC', sans-serif;
}
</style>
</head>
<body>
<div class="container">
  <div class="section-title">为什么"写下来"这么重要？</div>
  <div class="body-text">
    <p>心理学上有个说法叫<span class="highlight">蔡格尼克效应</span>——没完成的事情会一直占着你大脑的后台。</p>
    <p>就像手机开了一堆APP没关，越来越卡。</p>
    <p>但只要你把它写下来，大脑就觉得'这件事被处理了'，<span class="highlight">后台就关了</span>。</p>
    <p>而'划掉'的感觉会上瘾。每划掉一件，就多一点掌控感，焦虑就被挤走一点。</p>
  </div>
  <div class="tip-box">这个方法我七年前从一个哈佛学生的vlog学来的，坚持到现在。</div>
</div>
<div class="page-number">4 / 6</div>
</body>
</html>
